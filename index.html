<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reactor — Spotlight Multiplayer</title>
<style>
  :root {
    --bg:#fff; --canvas-bg:#fafafa; --dot:#d8d8d8; --border:#e6e6e6;
    --text:#1a1a1a; --muted:#8a8a8a; --accent:#ff5b2e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; color:var(--text); }
  body { background:var(--bg); }

  .page-tag { padding:6px 16px; font-size:12px; color:#8a8a8a; background:#f4f4f4; border-bottom:1px solid var(--border); }
  .topbar { height:56px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:24px; background:#fff; position:relative; z-index:30; }
  .brand-mark { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .logo { width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo svg { width:36px; height:36px; display:block; }
  .brand { font-weight:700; font-size:18px; color:#3a3a3a; letter-spacing:-0.2px; }
  .tabs { display:flex; gap:4px; align-items:center; }
  .tab { padding:18px 4px; font-size:14px; color:#5a5a5a; cursor:pointer; display:flex; align-items:center; gap:4px; position:relative; margin:0 8px; }
  .tab .caret { width:12px; height:12px; opacity:.55; }
  .tab.active { color:var(--accent); font-weight:500; }
  .tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
  .tab:hover:not(.active) { color:#1a1a1a; }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .topbar-right .you-avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; background-position:center; overflow:hidden; }

  /* Sub toolbar (second row) */
  .subbar { height:48px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; background:#fff; position:relative; z-index:29; }
  .graph-name { display:flex; align-items:center; gap:6px; font-size:14px; color:#1a1a1a; cursor:pointer; padding:6px 8px; border-radius:6px; }
  .graph-name:hover { background:#f5f5f5; }
  .graph-name svg { width:12px; height:12px; opacity:.6; }
  .subbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
  .saved { font-size:13px; color:#8a8a8a; margin-right:8px; cursor:pointer; padding:4px 6px; border-radius:6px; transition:background .12s, color .12s; }
  .saved:hover { background:#f5f5f5; color:#1a1a1a; }
  .subbar-divider { width:1px; height:20px; background:var(--border); margin:0 4px; }

  .avatar-group { display:flex; align-items:center; background:#f4f4f4; border-radius:18px; padding:3px 6px 3px 4px; gap:4px; cursor:pointer; }
  .avatar-group:hover { background:#eaeaea; }
  .avatar-stack { display:flex; }
  .avatar-chevron { width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:#6a6a6a; background:transparent; border:none; cursor:pointer; padding:0; }
  .avatar-chevron svg { width:14px; height:14px; }
  .avatar { width:26px; height:26px; border-radius:50%; border:2px solid #fff; margin-left:-6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; cursor:pointer; position:relative; transition:transform .2s, opacity .3s; background-size:cover; background-position:center; overflow:hidden; }
  .avatar:first-child { margin-left:0; }
  .avatar:hover { transform:translateY(-2px); z-index:5; }
  .avatar.live::after { content:''; position:absolute; bottom:-1px; right:-1px; width:8px; height:8px; background:#10b981; border:2px solid #fff; border-radius:50%; }
  .avatar.entering { animation:avatarIn .35s ease-out; }
  @keyframes avatarIn { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }

  .avatar-group.pulse { box-shadow:0 0 0 0 rgba(255,91,46,.6); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,91,46,.6);} 70%{box-shadow:0 0 0 12px rgba(255,91,46,0);} 100%{box-shadow:0 0 0 0 rgba(255,91,46,0);} }

  /* Top "you" section in panel */
  .panel-you { display:flex; align-items:center; gap:12px; padding:14px; border-bottom:1px solid var(--border); }
  .panel-you .avatar { width:36px; height:36px; font-size:13px; border:none; margin:0; }
  .panel-you .you-name { flex:1; font-size:14px; font-weight:600; }
  .panel-you .spotlight-me-btn { background:#4a5cf6; color:#fff; border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; transition:background .15s; }
  .panel-you .spotlight-me-btn:hover { background:#3a4ce6; }
  .panel-you .spotlight-me-btn.on { background:var(--accent); }
  .panel-you .spotlight-me-btn.on:hover { background:#e84d20; }

  .icon-btn { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; color:var(--muted); background:transparent; border:none; }
  .icon-btn:hover { background:#f2f2f2; color:var(--text); }
  .icon-btn svg { width:16px; height:16px; }

  .main { position:relative; width:100%; height:calc(100vh - 56px - 48px - 28px); overflow:hidden; background:var(--canvas-bg); }
  .search-bar { position:absolute; top:16px; left:16px; z-index:20; width:360px; height:36px; background:#fff; border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; padding:0 12px; gap:8px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .search-bar input { flex:1; border:none; outline:none; font-size:13px; background:transparent; }
  .search-bar input::placeholder { color:var(--muted); }

  .canvas-viewport { position:absolute; inset:0; overflow:hidden; }
  .canvas {
    position:absolute; width:3000px; height:2000px; left:50%; top:50%;
    transform:translate(-50%,-50%);
    background-color:#fafafa;
    background-image:
      linear-gradient(to right, #eaeaea 1px, transparent 1px),
      linear-gradient(to bottom, #eaeaea 1px, transparent 1px),
      radial-gradient(circle, #d8d8d8 1px, transparent 1px);
    background-size: 240px 240px, 240px 240px, 24px 24px;
    transition:transform 1s cubic-bezier(0.22,1,0.36,1);
  }
  .canvas svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  .node { position:absolute; width:56px; height:56px; border-radius:50%; background:#9a9a9a; border:none; box-shadow:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .2s, box-shadow .3s; }
  .node:hover { transform:scale(1.05); }
  .node.mixer-node { background:#e6356b; }
  .node .node-icon {
    position:absolute;
    top:50%; left:50%;
    width:24px; height:24px;
    transform:translate(-50%, -50%);
    color:#fff; opacity:.95;
    display:flex; align-items:center; justify-content:center;
  }
  .node .node-icon svg { width:100%; height:100%; display:block; }
  .node .node-badge {
    position:absolute; right:-2px; bottom:-2px;
    background:#ff8a3d; color:#fff;
    font-size:9px; font-weight:600;
    padding:2px 5px 2px 4px; border-radius:8px;
    display:flex; align-items:center; gap:2px;
    border:2px solid #fafafa;
    line-height:1;
  }
  .node .node-badge svg { width:9px; height:9px; }
  .node-label { position:absolute; top:100%; left:50%; transform:translate(-50%,8px); font-size:11px; color:#5a5a5a; white-space:nowrap; }
  .node-sublabel { position:absolute; top:calc(100% + 24px); left:50%; transform:translate(-50%,0); font-size:10px; color:#8a8a8a; background:#f0f0f0; padding:1px 8px; border-radius:8px; white-space:nowrap; }
  .node.selected-by-user { box-shadow:0 0 0 3px var(--user-color,#3b82f6); }
  .edge-label { position:absolute; font-size:11px; color:#5a5a5a; transform:translate(-50%,-50%); pointer-events:none; background:transparent; padding:1px 4px; }

  .cursor { position:absolute; pointer-events:none; z-index:100; transition:transform 1.4s cubic-bezier(0.22,1,0.36,1), opacity .35s; opacity:0; will-change:transform; }
  .cursor.visible { opacity:1; }
  .cursor svg { display:block; }
  .cursor-label { margin-top:4px; margin-left:12px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:500; color:#fff; white-space:nowrap; display:inline-block; }

  .spotlight-panel { position:absolute; width:300px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:50; overflow:hidden; transform-origin:top left; animation:panelIn .18s ease-out; }

  /* Version history drawer */
  .history-drawer {
    position:absolute; top:0; right:0; bottom:0; width:340px;
    background:#fff; border-left:1px solid var(--border);
    box-shadow:-8px 0 24px rgba(0,0,0,.06);
    z-index:60;
    transform:translateX(100%);
    transition:transform .25s cubic-bezier(0.22,1,0.36,1);
    display:flex; flex-direction:column;
  }
  .history-drawer.open { transform:translateX(0); }
  .history-header { padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); position:relative; }
  .history-title { font-size:15px; font-weight:600; flex:1; }
  .history-filter-btn { display:flex; align-items:center; gap:6px; background:#f4f4f4; border:none; border-radius:14px; padding:5px 12px 5px 8px; font-size:13px; color:#1a1a1a; cursor:pointer; transition:background .12s; }
  .history-filter-btn:hover { background:#eaeaea; }
  .history-filter-btn svg { width:14px; height:14px; }
  .history-close { background:transparent; border:none; cursor:pointer; color:var(--muted); padding:4px; border-radius:4px; display:flex; }
  .history-close:hover { background:#f2f2f2; color:#1a1a1a; }
  .history-close svg { width:18px; height:18px; }

  .filter-menu { position:absolute; top:48px; left:16px; min-width:220px; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:70; padding:6px 0; animation:panelIn .15s ease-out; transform-origin:top left; }
  .filter-menu-title { padding:8px 14px 4px; font-size:11px; color:var(--muted); font-weight:500; text-transform:none; }
  .filter-option { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; font-size:13px; color:#1a1a1a; }
  .filter-option:hover { background:#f5f5f5; }
  .filter-option .opt-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:#1a1a1a; }
  .filter-option .opt-icon svg { width:16px; height:16px; }
  .filter-option .opt-icon .avatar { width:18px; height:18px; border:none; margin:0; }
  .filter-option .opt-label { flex:1; }
  .filter-option .opt-check { color:#1a1a1a; opacity:0; }
  .filter-option.selected .opt-check { opacity:1; }
  .filter-option .opt-check svg { width:14px; height:14px; }
  .filter-menu-divider { height:1px; background:var(--border); margin:6px 0; }
  .history-body { flex:1; overflow-y:auto; padding-bottom:8px; }
  .history-group { padding:4px 0; }
  .history-group-header {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; cursor:pointer; user-select:none;
  }
  .history-group-header:hover .group-chevron { background:#eee; }
  .group-chevron {
    width:28px; height:28px; border-radius:50%;
    background:#f2f2f2; display:flex; align-items:center; justify-content:center;
    color:#555; transition:transform .2s, background .12s;
  }
  .group-chevron svg { width:14px; height:14px; }
  .history-group.collapsed .group-chevron svg { transform:rotate(-90deg); transition:transform .2s; }
  .history-group:not(.collapsed) .group-chevron svg { transform:rotate(0); transition:transform .2s; }
  .group-title { flex:1; font-size:15px; font-weight:600; color:#1a1a1a; }
  .group-meta { font-size:13px; color:var(--muted); }
  .group-current-badge { font-size:12px; background:#f2f2f2; color:#5a5a5a; padding:4px 10px; border-radius:14px; font-weight:500; }
  .history-items { padding:0 0 8px; }
  .history-group.collapsed .history-items { display:none; }

  .history-item {
    position:relative;
    display:flex; gap:12px; align-items:flex-start;
    padding:8px 16px 8px 18px;
    cursor:default;
    transition:background .12s;
  }
  .history-item:hover { background:#f7f7f7; }
  .item-avatar-wrap { position:relative; flex-shrink:0; }
  .item-avatar {
    width:36px; height:36px; border-radius:50%;
    background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
  }
  .item-avatar.actor-automation,
  .item-avatar.actor-llm {
    background:linear-gradient(135deg, #ff8a3d 0%, #ff5b2e 60%, #e6356b 100%);
  }
  .item-avatar.actor-data { background:#e8e8e8; color:#5a5a5a; }
  .item-avatar svg { width:18px; height:18px; }
  .item-avatar-attrib {
    position:absolute; right:-3px; bottom:-3px;
    width:18px; height:18px; border-radius:50%;
    border:2px solid #fff;
    background-size:cover; background-position:center;
  }
  .item-content { flex:1; min-width:0; padding-top:1px; }
  .item-time { font-size:14px; font-weight:600; color:#1a1a1a; line-height:1.25; }
  .item-desc { font-size:13px; color:#7a7a7a; margin-top:2px; line-height:1.3; }
  .item-extra { display:flex; align-items:center; gap:14px; margin-top:6px; }
  .item-chat-link { display:inline-flex; align-items:center; gap:5px; color:#5a4cf4; font-size:12px; font-weight:500; cursor:pointer; }
  .item-chat-link svg { width:14px; height:14px; }
  .item-menu-btn {
    background:transparent; border:none; cursor:pointer;
    width:28px; height:28px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); opacity:0; transition:opacity .12s, background .12s;
    flex-shrink:0;
  }
  .history-item:hover .item-menu-btn { opacity:1; }
  .item-menu-btn:hover { background:#eaeaea; color:#1a1a1a; }
  .item-menu-btn svg { width:16px; height:16px; }

  .item-popover {
    position:absolute; z-index:80;
    background:#fff; border:1px solid var(--border); border-radius:8px;
    box-shadow:0 6px 20px rgba(0,0,0,.12);
    padding:4px; min-width:180px;
    animation:panelIn .12s ease-out;
  }
  .item-popover .popover-action {
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:6px; cursor:pointer;
    font-size:13px; color:#1a1a1a;
  }
  .item-popover .popover-action:hover { background:#f5f5f5; }
  .item-popover .popover-action svg { width:15px; height:15px; color:#5a5a5a; }

  .history-show-older { padding:14px 16px; font-size:13px; color:#5a4cf4; font-weight:500; cursor:pointer; }
  .history-show-older:hover { text-decoration:underline; }

  .history-footer { padding:10px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }
  @keyframes panelIn { from { opacity:0; transform:scale(0.95) translateY(-4px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .panel-header { padding:12px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .panel-title { font-size:13px; font-weight:600; }
  .panel-toggle { background:#1a1a1a; color:#fff; border:none; padding:4px 10px; border-radius:12px; font-size:11px; cursor:pointer; }
  .panel-toggle.on { background:var(--accent); }
  .panel-section { padding:8px 0; }
  .panel-section-title { padding:6px 14px; font-size:11px; color:var(--muted); font-weight:500; }
  .user-row { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; transition:background .1s; position:relative; }
  .user-row:hover { background:#f7f7f7; }
  .user-row.active { background:#fff5f0; }
  .user-row .avatar { margin:0; width:28px; height:28px; font-size:11px; border:none; }
  .user-row .user-info { flex:1; }
  .user-row .user-name { font-size:13px; font-weight:500; }
  .user-row .user-meta { font-size:11px; color:var(--muted); }
  .user-row .following-badge { font-size:10px; color:var(--accent); font-weight:500; }
  .user-row.dim { opacity:.55; }
  .user-row.highlight { animation:rowGlow 1.4s ease-in-out infinite; }
  @keyframes rowGlow { 0%,100% { background:#fff5f0; } 50% { background:#ffe0d0; } }
  .user-row .row-more { width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--muted); opacity:0; transition:opacity .15s; }
  .user-row:hover .row-more { opacity:1; }
  .user-row .row-more svg { width:14px; height:14px; }
  .user-row .click-hint { font-size:11px; color:var(--muted); }

  .spotlight-frame { position:absolute; inset:0; pointer-events:none; z-index:25; border:3px solid transparent; transition:border-color .3s; }
  .spotlight-frame.active { border-color:var(--user-color,var(--accent)); }
  .spotlight-banner { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:var(--user-color,var(--accent)); color:#fff; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:500; z-index:26; display:none; align-items:center; gap:8px; box-shadow:0 2px 8px rgba(0,0,0,.15); }
  .spotlight-banner.show { display:flex; }
  .spotlight-banner button { background:rgba(255,255,255,.25); border:none; color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; cursor:pointer; }

  /* Click-through scene controller */
  .scene-controller { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:200; display:flex; align-items:center; gap:12px; background:#1a1a1a; color:#fff; padding:10px 14px; border-radius:24px; box-shadow:0 6px 24px rgba(0,0,0,.2); font-size:13px; }
  .scene-controller .scene-text { max-width:380px; }
  .scene-controller .scene-counter { font-size:11px; color:#888; padding:2px 8px; background:rgba(255,255,255,.08); border-radius:10px; }
  .scene-controller button { background:var(--accent); color:#fff; border:none; padding:6px 14px; border-radius:16px; font-size:12px; font-weight:500; cursor:pointer; }
  .scene-controller button:hover { background:#e84d20; }
  .scene-controller button.secondary { background:rgba(255,255,255,.1); }
  .scene-controller button.secondary:hover { background:rgba(255,255,255,.18); }

  .highlight-ring { position:absolute; pointer-events:none; border:2px solid var(--accent); border-radius:50%; animation:ringPulse 1.4s ease-out infinite; z-index:150; }
  @keyframes ringPulse { 0% { transform:scale(.9); opacity:1; } 100% { transform:scale(1.6); opacity:0; } }

  .tooltip { position:absolute; background:#1a1a1a; color:#fff; padding:4px 8px; border-radius:4px; font-size:11px; pointer-events:none; transform:translate(-50%,-120%); white-space:nowrap; opacity:0; transition:opacity .15s; z-index:200; }
  .tooltip.show { opacity:1; }
</style>
</head>
<body>
  <div class="page-tag">Graph</div>
  <div class="topbar">
    <div class="brand-mark">
      <div class="logo">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" fill="#ff5b2e"/>
          <g stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round">
            <path d="M12 14 C 12 9, 19 9, 19 14 C 19 19, 12 19, 12 24 C 12 29, 19 29, 19 24"/>
            <path d="M28 14 C 28 9, 21 9, 21 14 C 21 19, 28 19, 28 24 C 28 29, 21 29, 21 24"/>
            <circle cx="15.5" cy="20" r="3.2"/>
            <circle cx="24.5" cy="20" r="3.2"/>
          </g>
        </svg>
      </div>
      <div class="brand">Reactor</div>
    </div>
    <div class="tabs">
      <div class="tab">Cases</div>
      <div class="tab active">Graphs <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="tab">Community <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="tab">Labs</div>
      <div class="tab">Rapid</div>
      <div class="tab">Tools <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
      <div class="you-avatar" id="topYouAvatar" title="You"></div>
    </div>
  </div>
  <div class="subbar">
    <div class="graph-name">Graph name <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="subbar-right">
      <span class="saved" id="savedLabel" title="See version history">Edited 2 mins ago</span>
      <div class="avatar-group" id="avatarGroup">
        <div class="avatar-stack" id="avatarStack"></div>
        <button class="avatar-chevron" id="avatarChevron" title="Open live session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="subbar-divider"></div>

const edges = [
  { from:'n0', to:'n1', label:'$17k (3)' },

const canvas = document.getElementById('canvas');
const edgesSvg = document.getElementById('edges');
const main = document.getElementById('main');
function getNode(id) { return nodes.find(n => n.id === id); }

(function renderGraph() {
  edgesSvg.setAttribute('viewBox', '0 0 3000 2000');
  // arrowhead defs + lines
  const r = 32; // node radius for trimming arrow endpoints
  let svgInner = `
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#a8a8a8"/>
      </marker>
    </defs>
  `;
  edges.forEach(e => {
    const a = getNode(e.from), b = getNode(e.to);
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const ux = dx/len, uy = dy/len;
    const x1 = a.x + ux * (r + 2);
    const y1 = a.y + uy * (r + 2);
    const x2 = b.x - ux * (r + 8);
    const y2 = b.y - uy * (r + 8);
    svgInner += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#a8a8a8" stroke-width="1.2" marker-end="url(#arrow)"/>`;
  });
  edgesSvg.innerHTML = svgInner;

  edges.forEach(e => {
    const a = getNode(e.from), b = getNode(e.to);
    const lbl = document.createElement('div');
    lbl.className = 'edge-label';
    lbl.style.left = ((a.x + b.x)/2) + 'px';
    lbl.style.top = ((a.y + b.y)/2 - 12) + 'px';
    lbl.textContent = e.label;
    canvas.appendChild(lbl);
  });

  const walletIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1.2" fill="currentColor" stroke="none"/></svg>`;
  const mixerIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10v2l-3 4v4l4 8H6l4-8V8L7 4V2zm2.5 2l2 2.5v4.5l-3 6h7l-3-6V6.5L14.5 4h-5z"/></svg>`;
  const badgeWallet = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2zm-2 8h-2v-2h2v2z"/></svg>`;

  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.mixer ? ' mixer-node' : '');
    el.style.left = (n.x - 28) + 'px';
    el.style.top = (n.y - 28) + 'px';
    el.dataset.id = n.id;

    const icon = document.createElement('div');
    icon.className = 'node-icon';
    icon.innerHTML = n.mixer ? mixerIcon : walletIcon;
    el.appendChild(icon);

    const badge = document.createElement('div');
    badge.className = 'node-badge';
    badge.innerHTML = `${badgeWallet}<span>+3</span>`;
    el.appendChild(badge);

    const lbl = document.createElement('div');
    lbl.className = 'node-label';
    lbl.textContent = n.label;
    el.appendChild(lbl);

    if (n.sublabel) {
      const sub = document.createElement('div');
      sub.className = 'node-sublabel';
      sub.textContent = n.sublabel;
      el.appendChild(sub);
    }
    canvas.appendChild(el);
  });
})();

// ============== AVATARS ==============
const avatarStack = document.getElementById('avatarStack');
const tooltip = document.getElementById('tooltip');
const visibleUserIds = new Set(['you']);

function styleAvatar(el, u) {
  if (u.avatar) {
    el.style.backgroundImage = `url("${u.avatar}")`;
    el.style.backgroundColor = u.color;
    el.textContent = '';
  } else {
    el.style.backgroundColor = u.color;
    el.textContent = u.initials;
  }
}

function renderAvatars() {
  avatarStack.innerHTML = '';
  const order = users.filter(u => visibleUserIds.has(u.id)).concat([currentUser]);
  order.forEach(u => {
    const a = document.createElement('div');
    a.className = 'avatar entering' + (u.id !== 'you' ? ' live' : '');
    styleAvatar(a, u);
    a.dataset.id = u.id;
    a.addEventListener('mouseenter', () => {
      const r = a.getBoundingClientRect();
      tooltip.textContent = u.name + (u.id === 'you' ? ' (You)' : '');
      tooltip.style.left = (r.left + r.width/2) + 'px';
      tooltip.style.top = r.top + 'px';
      tooltip.classList.add('show');
    });
    a.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
    avatarStack.appendChild(a);
  });
}
renderAvatars();
styleAvatar(document.getElementById('topYouAvatar'), currentUser);

// ============== CURSORS (no autoplay) ==============
const cursorEls = {};
const cursorState = {}; // { x, y } in canvas coords

function createCursor(user) {
  const el = document.createElement('div');
  el.className = 'cursor';
  el.innerHTML = `
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 2 L17 9 L10 11 L8 18 Z" fill="${user.color}" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
    <div class="cursor-label" style="background:${user.color}">${user.name}</div>
  `;
  main.appendChild(el);
  cursorEls[user.id] = el;
  cursorState[user.id] = { x: 0, y: 0 };
}
users.forEach(createCursor);

const viewport = document.getElementById('viewport');
let camera = { x: 0, y: 0 };
function applyCamera() {
  canvas.style.transform = `translate(-50%,-50%) translate(${camera.x}px, ${camera.y}px)`;
  requestAnimationFrame(updateAllCursorScreenPositions);
}
function centerOnCanvasPoint(cx, cy) { camera.x = 1500 - cx; camera.y = 1000 - cy; applyCamera(); }
centerOnCanvasPoint(1200, 950);

function updateCursorScreen(uid) {
  const el = cursorEls[uid];
  const p = cursorState[uid];
  const cRect = canvas.getBoundingClientRect();
  const mainRect = main.getBoundingClientRect();
  const sx = cRect.width / 3000, sy = cRect.height / 2000;
  const fx = cRect.left + p.x * sx - mainRect.left;
  const fy = cRect.top + p.y * sy - mainRect.top;
  el.style.transform = `translate(${fx}px, ${fy}px)`;
}
function updateAllCursorScreenPositions() {
  Object.keys(cursorEls).forEach(updateCursorScreen);
}
window.addEventListener('resize', updateAllCursorScreenPositions);
// Re-sync cursor screen positions while camera CSS transition is running
canvas.addEventListener('transitionrun', () => {
  let frames = 0;
  function loop() { updateAllCursorScreenPositions(); if (frames++ < 70) requestAnimationFrame(loop); }
  loop();
});

function moveCursorTo(uid, x, y) {
  cursorState[uid] = { x, y };
  updateCursorScreen(uid);
}
function showCursor(uid) { cursorEls[uid].classList.add('visible'); }
function hideCursor(uid) { cursorEls[uid].classList.remove('visible'); }

// ============== SPOTLIGHT PANEL ==============
const avatarGroup = document.getElementById('avatarGroup');
const avatarChevron = document.getElementById('avatarChevron');
const spotlightFrame = document.getElementById('spotlightFrame');
const spotlightBanner = document.getElementById('spotlightBanner');
const spotlightBannerText = document.getElementById('spotlightBannerText');
const exitSpotlightBtn = document.getElementById('exitSpotlight');

let panel = null;
let spotlightTarget = null;
let meSpotlighting = false;
let highlightUserId = null; // user row to highlight in panel

function openPanel() {
  if (panel) return;
  panel = document.createElement('div');
  panel.className = 'spotlight-panel';
  panel.innerHTML = `
    <div class="panel-you">
      <div class="avatar" data-uid="${currentUser.id}"></div>
      <div class="you-name">${currentUser.name} <span style="color:var(--muted);font-weight:400">(you)</span></div>
      <button class="spotlight-me-btn ${meSpotlighting?'on':''}" id="meToggle">${meSpotlighting?'Spotlighting':'Spotlight me'}</button>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Currently viewing</div>
      <div id="currentlyViewing"></div>
    </div>
    <div class="panel-section" style="border-top:1px solid var(--border)">
      <div class="panel-section-title">Previously viewing</div>
      <div id="previouslyViewing"></div>
    </div>
  `;
  main.appendChild(panel);
  // position right below the avatar group, aligned to its left edge
  const agRect = avatarGroup.getBoundingClientRect();
  const mainRect = main.getBoundingClientRect();
  panel.style.left = Math.max(8, agRect.left - mainRect.left) + 'px';
  panel.style.top = (agRect.bottom - mainRect.top + 6) + 'px';
  // hydrate panel-you avatar
  panel.querySelectorAll('.avatar[data-uid]').forEach(el => {
    const uid = el.dataset.uid;
    const u = uid === 'you' ? currentUser : users.find(x => x.id === uid);
    if (u) styleAvatar(el, u);
  });
  renderPanelLists();
  document.getElementById('meToggle').addEventListener('click', toggleMeSpotlight);
}
function closePanel() { if (panel) { panel.remove(); panel = null; } }

function renderPanelLists() {
  if (!panel) return;
  const cur = document.getElementById('currentlyViewing');
  const prev = document.getElementById('previouslyViewing');
  const currently = users.filter(u => visibleUserIds.has(u.id));
  const previously = users.filter(u => !visibleUserIds.has(u.id));

  cur.innerHTML = '';
  currently.forEach(u => {
    const isFollowing = spotlightTarget && spotlightTarget.id === u.id;
    const row = document.createElement('div');
    row.className = 'user-row' + (isFollowing ? ' active' : '') + (highlightUserId === u.id ? ' highlight' : '');
    row.innerHTML = `
      <div class="avatar" data-uid="${u.id}"></div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-meta">${isFollowing ? 'You are following' : 'Click to follow'}</div>
      </div>
      ${isFollowing ? '<div class="following-badge">Following</div>' : '<div class="row-more"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg></div>'}
    `;
    styleAvatar(row.querySelector('.avatar'), u);
    row.addEventListener('click', () => {
      if (isFollowing) stopSpotlight();
      else startSpotlight(u);
    });
    cur.appendChild(row);
  });

  prev.innerHTML = '';
  if (previously.length === 0) {
    prev.innerHTML = '<div class="user-row dim"><div class="user-info"><div class="user-meta">No previous viewers</div></div></div>';
  } else {
    previously.forEach(u => {
      const row = document.createElement('div');
      row.className = 'user-row dim';
      row.innerHTML = `
        <div class="avatar" data-uid="${u.id}"></div>
        <div class="user-info">
          <div class="user-name">${u.name}</div>
          <div class="user-meta">left a moment ago</div>
        </div>
      `;
      styleAvatar(row.querySelector('.avatar'), u);
      prev.appendChild(row);
    });
  }
}

function startSpotlight(user) {
  spotlightTarget = user;
  spotlightFrame.classList.add('active');
  spotlightFrame.style.setProperty('--user-color', user.color);
  spotlightBanner.style.background = user.color;
  spotlightBannerText.textContent = 'Following ' + user.name;
  spotlightBanner.classList.add('show');
  const p = cursorState[user.id];
  if (p) centerOnCanvasPoint(p.x, p.y);
  renderPanelLists();
}
function stopSpotlight() {
  spotlightTarget = null;
  if (!meSpotlighting) { spotlightFrame.classList.remove('active'); spotlightBanner.classList.remove('show'); }
  renderPanelLists();
}
exitSpotlightBtn.addEventListener('click', () => { stopSpotlight(); meSpotlighting && toggleMeSpotlight(); });

function toggleMeSpotlight() {
  meSpotlighting = !meSpotlighting;
  const toggleEl = document.getElementById('meToggle');
  if (toggleEl) { toggleEl.classList.toggle('on', meSpotlighting); toggleEl.textContent = meSpotlighting ? 'Spotlighting' : 'Spotlight me'; }
  if (meSpotlighting) {
    spotlightFrame.classList.add('active');
    spotlightFrame.style.setProperty('--user-color', currentUser.color);
    spotlightBanner.style.background = currentUser.color;
    spotlightBannerText.textContent = 'You are spotlighting — others can follow you';
    spotlightBanner.classList.add('show');
  } else if (!spotlightTarget) {
    spotlightFrame.classList.remove('active');
    spotlightBanner.classList.remove('show');
  }
}

avatarGroup.addEventListener('click', (e) => {
  e.stopPropagation();
  avatarGroup.classList.remove('pulse');
  panel ? closePanel() : openPanel();
});
document.addEventListener('mousedown', (e) => {
  if (!panel) return;
  if (panel.contains(e.target)) return;
  if (avatarGroup.contains(e.target)) return;
  closePanel();
});

  all: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 14a3 3 0 0 0 5.2 2"/><polyline points="9 14 9 17 12 17"/></svg>`,
  automation: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 6h6a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4H11a4 4 0 0 0-4 4v0"/></svg>`,
  llm: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a3 3 0 0 0-3 3v0a2.5 2.5 0 0 0-2 4v0a2.5 2.5 0 0 0 1 4.5v0a2.5 2.5 0 0 0 1 4.5v0A3 3 0 0 0 9 21h.5V3H9zM15 3a3 3 0 0 1 3 3v0a2.5 2.5 0 0 1 2 4v0a2.5 2.5 0 0 1-1 4.5v0a2.5 2.5 0 0 1-1 4.5v0A3 3 0 0 1 15 21h-.5V3H15z"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  close: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

function filterLabel() {
  return { all:'All', yours:'Only yours', automation:'Only Automations', llm:'Only LLM' }[historyFilter] || 'All';
}

function getFilteredHistory() {
  return versionHistory.map(grp => ({
    group: grp.group,
    current: grp.current,
    items: grp.items.filter(it => {
      if (!showAutoSaved && it.autoSaved) return false;
      if (historyFilter === 'all') return true;
      if (historyFilter === 'yours') return it.actorId === 'you';
      if (historyFilter === 'automation') return it.actor === 'automation';
      if (historyFilter === 'llm') return it.actor === 'llm';
      return true;
    })
  })).filter(g => g.items.length > 0);
}

const actorIcons = {
  automation: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 6h6a4 4 0 0 1 4 4v0a4 4 0 0 1-4 4H11a4 4 0 0 0-4 4v0"/></svg>`,
  llm: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 4.4L18 8l-4.4 1.6L12 14l-1.6-4.4L6 8l4.4-1.6L12 2zm6 11l1 2.5 2.5 1-2.5 1L18 20l-1-2.5L14.5 16.5l2.5-1L18 13z"/></svg>`,
  data: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/><path d="M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/><path d="M12 13v8M9 17l3-3 3 3"/></svg>`,
};

function chatLinkSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a3 3 0 0 0-3 3v0a2.5 2.5 0 0 0-2 4v0a2.5 2.5 0 0 0 1 4.5v0a2.5 2.5 0 0 0 1 4.5v0A3 3 0 0 0 9 21h.5V3H9zM15 3a3 3 0 0 1 3 3v0a2.5 2.5 0 0 1 2 4v0a2.5 2.5 0 0 1-1 4.5v0a2.5 2.5 0 0 1-1 4.5v0A3 3 0 0 1 15 21h-.5V3H15z"/></svg>`;
}

function renderHistoryBody() {
  const body = historyDrawer.querySelector('#historyBody');
  body.innerHTML = '';
  const data = getFilteredHistory();
  if (data.length === 0) {
    body.innerHTML = '<div style="padding:32px 16px;text-align:center;color:#8a8a8a;font-size:13px;">No versions match this filter</div>';
    return;
  }
  data.forEach(grp => {
    const isCollapsed = collapsedGroups.has(grp.group);
    const g = document.createElement('div');
    g.className = 'history-group' + (isCollapsed ? ' collapsed' : '');
    const rightMeta = grp.current ? `<div class="group-current-badge">Current version</div>` : `<div class="group-meta">${grp.items.length} versions</div>`;
    g.innerHTML = `
      <div class="history-group-header">
        <div class="group-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="group-title">${grp.group.startsWith('March') || grp.group === 'Yesterday' || grp.group === 'Today' ? grp.group : grp.group}</div>
        ${rightMeta}
      </div>
      <div class="history-items"></div>
    `;
    g.querySelector('.history-group-header').addEventListener('click', () => {
      if (collapsedGroups.has(grp.group)) collapsedGroups.delete(grp.group);
      else collapsedGroups.add(grp.group);
      renderHistoryBody();
    });

    const itemsContainer = g.querySelector('.history-items');
    grp.items.forEach(it => {
      const item = document.createElement('div');
      item.className = 'history-item';

      // Avatar
      const avatarWrap = document.createElement('div');
      avatarWrap.className = 'item-avatar-wrap';
      const av = document.createElement('div');
      av.className = 'item-avatar';
      if (it.actor === 'user') {
        const u = it.actorId === 'you' ? currentUser : users.find(x => x.id === it.actorId);
        if (u) styleAvatar(av, u);
      } else if (it.actor === 'automation') {
        av.classList.add('actor-automation');
        av.innerHTML = actorIcons.automation;
      } else if (it.actor === 'llm') {
        av.classList.add('actor-llm');
        av.innerHTML = actorIcons.llm;
      } else if (it.actor === 'data') {
        av.classList.add('actor-data');
        av.innerHTML = actorIcons.data;
      }
      avatarWrap.appendChild(av);

      // Attribution sub-avatar (for automation/llm triggered by user)
      if ((it.actor === 'automation' || it.actor === 'llm') && it.actorId) {
        const u = it.actorId === 'you' ? currentUser : users.find(x => x.id === it.actorId);
        if (u) {
          const sub = document.createElement('div');
          sub.className = 'item-avatar-attrib';
          if (u.avatar) sub.style.backgroundImage = `url("${u.avatar}")`;
          else sub.style.backgroundColor = u.color;
          avatarWrap.appendChild(sub);
        }
      }
      item.appendChild(avatarWrap);

      // Content
      const content = document.createElement('div');
      content.className = 'item-content';
      content.innerHTML = `
        <div class="item-time">${it.time}</div>
        <div class="item-desc">${it.desc}</div>
        ${it.chat ? `<div class="item-extra"><span class="item-chat-link">${chatLinkSvg()} View in chat</span></div>` : ''}
      `;
      item.appendChild(content);

      // Menu button (skip on current)
      if (!it.current) {
        const menuBtn = document.createElement('button');
        menuBtn.className = 'item-menu-btn';
        menuBtn.title = 'More';
        menuBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>`;
        menuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openItemPopover(menuBtn, it);
        });
        item.appendChild(menuBtn);
      }

      itemsContainer.appendChild(item);
    });

    body.appendChild(g);
  });

  // Show older link
  const showOlder = document.createElement('div');
  showOlder.className = 'history-show-older';
  showOlder.textContent = 'Show older';
  showOlder.addEventListener('click', () => {
    showOlder.textContent = 'No older versions';
    showOlder.style.color = 'var(--muted)';
    showOlder.style.cursor = 'default';
  });
  body.appendChild(showOlder);
}

let openPopover = null;
function closeItemPopover() {
  if (openPopover) { openPopover.remove(); openPopover = null; }
}
function openItemPopover(anchor, item) {
  closeItemPopover();
  const pop = document.createElement('div');
  pop.className = 'item-popover';
  pop.innerHTML = `
    <div class="popover-action" data-act="duplicate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Duplicate
    </div>
    <div class="popover-action" data-act="restore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Restore this version
    </div>
  `;
  historyDrawer.appendChild(pop);
  // position near anchor
  const aRect = anchor.getBoundingClientRect();
  const dRect = historyDrawer.getBoundingClientRect();
  pop.style.left = (aRect.left - dRect.left - 170) + 'px';
  pop.style.top = (aRect.bottom - dRect.top + 4) + 'px';
  openPopover = pop;
  pop.querySelectorAll('.popover-action').forEach(a => a.addEventListener('click', (e) => {
    e.stopPropagation();
    const act = a.dataset.act;
    if (act === 'restore') {
      a.textContent = 'Restored ✓';
      a.style.color = 'var(--accent)';
      setTimeout(() => { closeItemPopover(); closeHistory(); }, 600);
    } else {
      closeItemPopover();
    }
  }));
}

function closeFilterMenu() { if (filterMenu) { filterMenu.remove(); filterMenu = null; } }
function openFilterMenu() {
  if (filterMenu) { closeFilterMenu(); return; }
  filterMenu = document.createElement('div');
  filterMenu.className = 'filter-menu';
  filterMenu.innerHTML = `
    <div class="filter-menu-title">Filter by</div>
    <div class="filter-option ${historyFilter==='all'?'selected':''}" data-f="all">
      <div class="opt-icon">${filterIcons.all}</div>
      <div class="opt-label">All</div>
      <div class="opt-check">${filterIcons.check}</div>
    </div>
    <div class="filter-option ${historyFilter==='yours'?'selected':''}" data-f="yours">
      <div class="opt-icon"><div class="avatar" data-uid="you"></div></div>
      <div class="opt-label">Only yours</div>
      <div class="opt-check">${filterIcons.check}</div>
    </div>
    <div class="filter-option ${historyFilter==='automation'?'selected':''}" data-f="automation">
      <div class="opt-icon">${filterIcons.automation}</div>
      <div class="opt-label">Only Automations</div>
      <div class="opt-check">${filterIcons.check}</div>
    </div>
    <div class="filter-option ${historyFilter==='llm'?'selected':''}" data-f="llm">
      <div class="opt-icon">${filterIcons.llm}</div>
      <div class="opt-label">Only LLM</div>
      <div class="opt-check">${filterIcons.check}</div>
    </div>
    <div class="filter-menu-divider"></div>
    <div class="filter-option ${showAutoSaved?'selected':''}" data-toggle="autosaved">
      <div class="opt-label">Show auto saved versions</div>
      <div class="opt-check">${filterIcons.check}</div>
    </div>
  `;
  historyDrawer.querySelector('.history-header').appendChild(filterMenu);
  filterMenu.querySelectorAll('.avatar[data-uid]').forEach(el => {
    const u = el.dataset.uid === 'you' ? currentUser : users.find(x => x.id === el.dataset.uid);
    if (u) styleAvatar(el, u);
  });
  filterMenu.querySelectorAll('.filter-option[data-f]').forEach(opt => {
    opt.addEventListener('click', (e) => {
      e.stopPropagation();
      historyFilter = opt.dataset.f;
      historyDrawer.querySelector('#filterBtnLabel').textContent = filterLabel();
      renderHistoryBody();
      closeFilterMenu();
    });
  });
  filterMenu.querySelector('[data-toggle="autosaved"]').addEventListener('click', (e) => {
    e.stopPropagation();
    showAutoSaved = !showAutoSaved;
    renderHistoryBody();
    // refresh menu in-place to update check
    const wasOpen = !!filterMenu;
    closeFilterMenu();
    if (wasOpen) openFilterMenu();
  });
}

function openHistory() {
  if (historyDrawer) return;
  historyDrawer = document.createElement('div');
  historyDrawer.className = 'history-drawer';
  historyDrawer.innerHTML = `
    <div class="history-header">
      <button class="history-filter-btn" id="historyFilterBtn" title="Filter">
        ${filterIcons.all}
        <span id="filterBtnLabel">${filterLabel()}</span>
      </button>
      <div class="history-title" style="text-align:right;font-size:13px;color:var(--muted);font-weight:500;">Version history</div>
      <button class="history-close" id="historyClose" title="Close">${filterIcons.close}</button>
    </div>
    <div class="history-body" id="historyBody"></div>
    <div class="history-footer">Only the last 30 days are shown</div>
  `;
  main.appendChild(historyDrawer);
  renderHistoryBody();
  historyDrawer.querySelector('#historyClose').addEventListener('click', closeHistory);
  historyDrawer.querySelector('#historyFilterBtn').addEventListener('click', (e) => { e.stopPropagation(); openFilterMenu(); });
  requestAnimationFrame(() => historyDrawer.classList.add('open'));
}
function closeHistory() {
  closeFilterMenu();
  if (!historyDrawer) return;
  historyDrawer.classList.remove('open');
  const d = historyDrawer;
  historyDrawer = null;
  setTimeout(() => d.remove(), 250);
}
document.getElementById('savedLabel').addEventListener('click', (e) => {
  e.stopPropagation();
  historyDrawer ? closeHistory() : openHistory();
});
document.addEventListener('mousedown', (e) => {
  if (filterMenu && !filterMenu.contains(e.target) && !historyDrawer.querySelector('#historyFilterBtn').contains(e.target)) {
    closeFilterMenu();
  }
  if (!historyDrawer) return;
  if (historyDrawer.contains(e.target)) return;
  if (document.getElementById('savedLabel').contains(e.target)) return;
  closeHistory();
});

// ============== SCENE CONTROLLER ==============
const sceneText = document.getElementById('sceneText');
const sceneCounter = document.getElementById('sceneCounter');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

const scenes = [
  {
    text: "You're alone on this graph. Click Next to see what happens when teammates join.",
    enter() {
      visibleUserIds.clear(); visibleUserIds.add('you');
      users.forEach(u => hideCursor(u.id));
      clearAllSelections();
      closePanel();
      stopSpotlight();
      if (meSpotlighting) toggleMeSpotlight();
      centerOnCanvasPoint(1200, 950);
      renderAvatars();
    }
  },
  {
    text: "Tom Martin just joined. His avatar appears in the top bar and his cursor shows up on the canvas.",
    enter() {
      visibleUserIds.add('tom');
      renderAvatars();
      moveCursorTo('tom', 1400, 1280);
      showCursor('tom');
      clearAllSelections();
    }
  },
  {
    text: "Tom clicked a node — you can see his red selection ring. His cursor moved too.",
    enter() {
      visibleUserIds.add('tom');
      renderAvatars();
      showCursor('tom');
      moveCursorTo('tom', 1620, 950);
      setTimeout(() => selectNodeByUser('n5', users[0]), 200);
    }
  },
  {
    text: "Adam H joined too. Two teammates are now exploring with you.",
    enter() {
      visibleUserIds.add('tom'); visibleUserIds.add('adam');
      renderAvatars();
      showCursor('tom'); showCursor('adam');
      moveCursorTo('tom', 1620, 950);
      moveCursorTo('adam', 750, 600);
      selectNodeByUser('n5', users[0]);
    }
  },
  {
    text: "Click the avatar group in the top bar to open the live session panel →",
    enter() {
      avatarGroup.classList.add('pulse');
      closePanel();
    },
    exit() { avatarGroup.classList.remove('pulse'); }
  },
  {
    text: "Click Tom Martin in the panel to follow his view.",
    enter() {
      openPanel();
      highlightUserId = 'tom';
      renderPanelLists();
    },
    exit() { highlightUserId = null; renderPanelLists(); }
  },
  {
    text: "You're now following Tom — the canvas pans to his view and a red frame shows you're in spotlight mode.",
    enter() {
      openPanel();
      startSpotlight(users[0]);
      setTimeout(() => moveCursorTo('tom', 1700, 880), 600);
    }
  },
  {
    text: "Click 'Spotlight me' to broadcast your own view. Others can now follow you.",
    enter() {
      stopSpotlight();
      if (!meSpotlighting) toggleMeSpotlight();
      openPanel();
      // simulate Adam following you — move his cursor near yours
      moveCursorTo('adam', 1000, 950);
      moveCursorTo('tom', 1050, 980);
      centerOnCanvasPoint(1200, 950);
    }
  },
];

let sceneIdx = 0;
function goToScene(i) {
  if (i < 0 || i >= scenes.length) return;
  const prev = scenes[sceneIdx];
  if (prev && prev.exit) prev.exit();
  sceneIdx = i;
  const s = scenes[sceneIdx];
  s.enter();
  sceneText.textContent = s.text;
  sceneCounter.textContent = `${sceneIdx + 1} / ${scenes.length}`;
  prevBtn.style.opacity = sceneIdx === 0 ? '.4' : '1';
  prevBtn.style.pointerEvents = sceneIdx === 0 ? 'none' : 'auto';
  nextBtn.textContent = sceneIdx === scenes.length - 1 ? 'Restart ↻' : 'Next →';
}
nextBtn.addEventListener('click', () => {
  if (sceneIdx === scenes.length - 1) goToScene(0);
  else goToScene(sceneIdx + 1);
});
prevBtn.addEventListener('click', () => goToScene(sceneIdx - 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextBtn.click();
  if (e.key === 'ArrowLeft') prevBtn.click();
});

goToScene(0);
</script>
</body>
</html>
