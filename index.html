<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Reactor — Spotlight Multiplayer</title>
<style>
  :root {
    --bg:#fff; --canvas-bg:#fafafa; --dot:#d8d8d8; --border:#e6e6e6;
    --text:#1a1a1a; --muted:#8a8a8a; --accent:#ff5b2e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; color:var(--text); }
  body { background:var(--bg); }

  .page-tag { padding:6px 16px; font-size:12px; color:#8a8a8a; background:#f4f4f4; border-bottom:1px solid var(--border); }
  .topbar { height:56px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:24px; background:#fff; position:relative; z-index:30; }
  .brand-mark { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .logo { width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .logo svg { width:36px; height:36px; display:block; }
  .brand { font-weight:700; font-size:18px; color:#3a3a3a; letter-spacing:-0.2px; }
  .tabs { display:flex; gap:4px; align-items:center; }
  .tab { padding:18px 4px; font-size:14px; color:#5a5a5a; cursor:pointer; display:flex; align-items:center; gap:4px; position:relative; margin:0 8px; }
  .tab .caret { width:12px; height:12px; opacity:.55; }
  .tab.active { color:var(--accent); font-weight:500; }
  .tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
  .tab:hover:not(.active) { color:#1a1a1a; }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .topbar-right .you-avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; background-size:cover; background-position:center; overflow:hidden; }

  /* Sub toolbar (second row) */
  .subbar { height:48px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; background:#fff; position:relative; z-index:29; }
  .graph-name { display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:500; color:#1a1a1a; cursor:pointer; padding:7px 12px 7px 14px; border-radius:8px; border:1px solid var(--border); background:#fff; transition:background .12s, border-color .12s, box-shadow .12s; }
  .graph-name:hover { background:#fafafa; border-color:#d0d0d0; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .graph-name svg { width:12px; height:12px; opacity:.7; }
  .subbar-right { margin-left:auto; display:flex; align-items:center; gap:6px; }
  .saved { font-size:13px; color:#8a8a8a; margin-right:8px; cursor:pointer; padding:4px 8px 4px 6px; border-radius:6px; transition:background .12s, color .12s; display:inline-flex; align-items:center; gap:10px; }
  .saved svg { width:22px; height:22px; opacity:.85; }
  .saved:hover { background:#f5f5f5; color:#1a1a1a; }
  .saved-icon-wrap { position:relative; display:inline-flex; align-items:center; justify-content:center; padding-right:6px; padding-top:4px; }
  .saved-badge {
    position:absolute; top:-2px; right:-4px;
    background:#ff5b2e; color:#fff;
    font-size:9px; font-weight:700; line-height:1;
    min-width:14px; height:14px; padding:0 3px;
    border-radius:7px; border:1.5px solid #fff;
    display:inline-flex; align-items:center; justify-content:center;
    box-sizing:border-box;
  }
  .subbar-divider { width:1px; height:20px; background:var(--border); margin:0 4px; }

  .avatar-group { display:flex; align-items:center; background:#f4f4f4; border-radius:18px; padding:3px 6px 3px 4px; gap:4px; cursor:pointer; }
  .avatar-group:hover { background:#eaeaea; }
  .avatar-stack { display:flex; }
  .avatar-chevron { width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:#6a6a6a; background:transparent; border:none; cursor:pointer; padding:0; }
  .avatar-chevron svg { width:14px; height:14px; }
  .avatar { width:26px; height:26px; border-radius:50%; border:2px solid #fff; margin-left:-6px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; cursor:pointer; position:relative; transition:transform .2s, opacity .3s; background-size:cover; background-position:center; overflow:hidden; }
  .avatar:first-child { margin-left:0; }
  .avatar:hover { transform:translateY(-2px); z-index:5; }
  .avatar.live::after { content:none; }
  .avatar.entering { animation:avatarIn .35s ease-out; }
  @keyframes avatarIn { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }

  .avatar-group.pulse { box-shadow:0 0 0 0 rgba(255,91,46,.6); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,91,46,.6);} 70%{box-shadow:0 0 0 12px rgba(255,91,46,0);} 100%{box-shadow:0 0 0 0 rgba(255,91,46,0);} }
  .saved.pulse { border-radius:20px; box-shadow:0 0 0 0 rgba(255,91,46,.6); animation:pulse 1.4s infinite; }
  .graph-name.pulse { box-shadow:0 0 0 0 rgba(255,91,46,.6); animation:pulse 1.4s infinite; }
  .ts-play-btn.pulse { box-shadow:0 0 0 0 rgba(255,91,46,.6); animation:pulse 1.4s infinite; }

  /* Top "you" section in panel */
  .panel-you { display:flex; align-items:center; gap:12px; padding:14px; border-bottom:1px solid var(--border); }
  .panel-you .avatar { width:36px; height:36px; font-size:13px; border:none; margin:0; }
  .panel-you .you-name { flex:1; font-size:14px; font-weight:600; }
  .panel-you .spotlight-me-btn { background:#4a5cf6; color:#fff; border:none; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; transition:background .15s; }
  .panel-you .spotlight-me-btn:hover { background:#3a4ce6; }
  .panel-you .spotlight-me-btn.on { background:var(--accent); }
  .panel-you .spotlight-me-btn.on:hover { background:#e84d20; }

  .icon-btn { width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; cursor:pointer; color:var(--muted); background:transparent; border:none; }
  .icon-btn:hover { background:#f2f2f2; color:var(--text); }
  .icon-btn svg { width:16px; height:16px; }

  .main { position:relative; width:100%; height:calc(100vh - 56px - 48px); overflow:hidden; background:var(--canvas-bg); }
  .search-bar { position:absolute; top:16px; left:16px; z-index:20; width:360px; height:36px; background:#fff; border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; padding:0 12px; gap:8px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .search-bar input { flex:1; border:none; outline:none; font-size:13px; background:transparent; }
  .search-bar input::placeholder { color:var(--muted); }

  .canvas-viewport { position:absolute; inset:0; overflow:hidden; transition:right .35s cubic-bezier(0.22,1,0.36,1); }
  body.has-history-drawer .canvas-viewport { right:420px; }
  .canvas {
    position:absolute; width:3000px; height:2000px; left:50%; top:50%;
    transform:translate(-50%,-50%);
    background-color:#fafafa;
    background-image:
      linear-gradient(to right, #eaeaea 1px, transparent 1px),
      linear-gradient(to bottom, #eaeaea 1px, transparent 1px),
      radial-gradient(circle, #d8d8d8 1px, transparent 1px);
    background-size: 240px 240px, 240px 240px, 24px 24px;
    transition:transform 1s cubic-bezier(0.22,1,0.36,1);
  }
  .canvas svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

  .node { position:absolute; width:56px; height:56px; border-radius:50%; background:#9a9a9a; border:none; box-shadow:none; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .2s, box-shadow .3s; }
  .node:hover { transform:scale(1.05); }
  .node.mixer-node { background:#e6356b; }
  .node .node-icon {
    position:absolute;
    top:50%; left:50%;
    width:24px; height:24px;
    transform:translate(-50%, -50%);
    color:#fff; opacity:.95;
    display:flex; align-items:center; justify-content:center;
  }
  .node .node-icon svg { width:100%; height:100%; display:block; }
  .node .node-badge {
    position:absolute; right:-2px; bottom:-2px;
    background:#ff8a3d; color:#fff;
    font-size:9px; font-weight:600;
    padding:2px 5px 2px 4px; border-radius:8px;
    display:flex; align-items:center; gap:2px;
    border:2px solid #fafafa;
    line-height:1;
  }
  .node .node-badge svg { width:9px; height:9px; }
  .node-label { position:absolute; top:100%; left:50%; transform:translate(-50%,8px); font-size:11px; color:#5a5a5a; white-space:nowrap; }
  .node-sublabel { position:absolute; top:calc(100% + 24px); left:50%; transform:translate(-50%,0); font-size:10px; color:#8a8a8a; background:#f0f0f0; padding:1px 8px; border-radius:8px; white-space:nowrap; }
  .node.selected-by-user { box-shadow:0 0 0 3px var(--user-color,#3b82f6); }
  .edge-label { position:absolute; font-size:11px; color:#5a5a5a; transform:translate(-50%,-50%); pointer-events:none; background:transparent; padding:1px 4px; }

  .ai-region {
    position:absolute;
    background:rgba(99,102,241,0.08);
    border:1px solid rgba(99,102,241,0.35);
    border-radius:14px;
    pointer-events:none;
    transition:opacity .35s ease;
  }
  .ai-region.tt-hidden { opacity:0; }
  .ai-region-chip {
    position:absolute;
    top:-22px; left:18px;
    display:inline-flex; align-items:center; gap:10px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:999px;
    padding:5px 14px 5px 5px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    font-size:13px; font-weight:500; color:#1f1f1f;
    white-space:nowrap;
  }
  .ai-region-chip .ai-avatar-wrap { position:relative; flex-shrink:0; }
  .ai-region-chip .ai-avatar {
    width:32px; height:32px; border-radius:50%;
    background:linear-gradient(135deg, #ff8a3d 0%, #ff5b2e 60%, #e6356b 100%);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .ai-region-chip .ai-avatar svg { width:20px; height:20px; display:block; }
  .ai-region-chip .ai-attrib {
    position:absolute; right:-3px; bottom:-3px;
    width:16px; height:16px; border-radius:50%;
    border:2px solid #fff;
    background-size:cover; background-position:center;
  }

  .cursor { position:absolute; pointer-events:none; z-index:100; transition:transform 1.4s cubic-bezier(0.22,1,0.36,1), opacity .35s; opacity:0; will-change:transform; }
  .cursor.visible { opacity:1; }
  .cursor svg { display:block; }
  .cursor-label { margin-top:4px; margin-left:12px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:500; color:#fff; white-space:nowrap; display:inline-block; }

  .spotlight-panel { position:absolute; width:300px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:50; overflow:hidden; transform-origin:top left; animation:panelIn .18s ease-out; }

  /* Left-side chat drawer (agentic chat experience) */
  .chat-drawer {
    position:absolute; bottom:80px; left:20px; width:380px; height:50vh;
    background:#fafafa; border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    box-shadow:0 12px 32px rgba(0,0,0,.14);
    z-index:60;
    opacity:0; transform:translate(-12px, 12px);
    transition:opacity .25s ease, transform .25s cubic-bezier(0.22,1,0.36,1);
    display:flex; flex-direction:column;
  }
  .chat-drawer.open { opacity:1; transform:translate(0, 0); }
  .chat-header {
    padding:12px 14px; display:flex; align-items:center; gap:10px;
    background:#fafafa; border-bottom:1px solid #ececec;
  }
  .chat-header .chat-logo {
    width:26px; height:26px; flex-shrink:0;
  }
  .chat-header .chat-logo svg { width:100%; height:100%; }
  .chat-header .chat-title {
    flex:1; font-size:14px; font-weight:600; color:#1a1a1a;
    display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .chat-header .chat-title svg { width:14px; height:14px; opacity:.6; }
  .chat-header .chat-progress {
    width:80px; height:6px; background:#e5e5e5; border-radius:3px; overflow:hidden;
  }
  .chat-header .chat-progress > div { width:55%; height:100%; background:#2563eb; }
  .chat-header .chat-collapse {
    width:28px; height:28px; border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#5a5a5a; border-radius:6px;
  }
  .chat-header .chat-collapse:hover { background:#eee; color:#1a1a1a; }
  .chat-header .chat-collapse svg { width:16px; height:16px; }

  .chat-body {
    flex:1; overflow-y:auto; padding:18px 20px 12px;
    display:flex; flex-direction:column; gap:14px;
  }
  .chat-msg-user {
    background:#efefef; border-radius:14px; padding:12px 14px;
    font-size:14px; line-height:1.5; color:#1a1a1a;
  }
  .chat-msg-assistant {
    font-size:14px; line-height:1.55; color:#1a1a1a;
  }
  .chat-msg-assistant h3 {
    font-size:16px; font-weight:700; margin:6px 0 8px;
  }
  .chat-msg-assistant p { margin:0 0 12px; }
  .chat-msg-assistant ul { margin:6px 0 12px; padding-left:20px; }
  .chat-msg-assistant li { margin-bottom:3px; }
  .chat-msg-assistant strong { font-weight:600; }
  .chat-msg-assistant code { background:#f0f0f0; padding:1px 5px; border-radius:4px; font-family:ui-monospace, Menlo, Monaco, monospace; font-size:12.5px; }

  .chat-input-wrap {
    padding:10px 14px 14px;
  }
  .chat-input {
    background:#fff; border:1px solid #e3e3e3; border-radius:14px;
    padding:12px 14px 10px;
    box-shadow:0 1px 2px rgba(0,0,0,.02);
  }
  .chat-input .ci-text {
    width:100%; border:none; outline:none; resize:none;
    font-size:14px; color:#1a1a1a; min-height:24px; max-height:120px;
    background:transparent; font-family:inherit;
  }
  .chat-input .ci-text::placeholder { color:#9a9a9a; }
  .chat-input .ci-actions {
    display:flex; align-items:center; gap:10px; margin-top:8px;
  }
  .chat-input .ci-plus {
    width:28px; height:28px; border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#5a5a5a; border-radius:6px;
  }
  .chat-input .ci-plus:hover { background:#f2f2f2; color:#1a1a1a; }
  .chat-input .ci-plus svg { width:18px; height:18px; }
  .chat-input .ci-model {
    margin-left:auto; font-size:12px; color:#6a6a6a;
    display:inline-flex; align-items:center; gap:4px; cursor:pointer;
  }
  .chat-input .ci-model svg { width:12px; height:12px; opacity:.6; }
  .chat-input .ci-send {
    width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
    background:#2563eb; color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .chat-input .ci-send:hover { background:#1d4fd1; }
  .chat-input .ci-send svg { width:16px; height:16px; }

  /* Version history drawer */
  .history-drawer {
    position:absolute; top:0; right:0; bottom:0; width:420px;
    background:#fff; border-left:1px solid var(--border);
    box-shadow:-8px 0 24px rgba(0,0,0,.06);
    z-index:60;
    transform:translateX(100%);
    transition:transform .25s cubic-bezier(0.22,1,0.36,1);
    display:flex; flex-direction:column;
  }
  .history-drawer.open { transform:translateX(0); }
  .history-header { padding:14px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); position:relative; }
  .history-title { font-size:15px; font-weight:600; flex:1; display:flex; align-items:center; gap:8px; }
  .history-title-count {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:20px; height:20px; padding:0 6px;
    font-size:11px; font-weight:600; color:#6a6a6a;
    background:#eef0f3; border-radius:10px; line-height:1;
  }
  .history-filter-btn { display:flex; align-items:center; gap:6px; background:#f4f4f4; border:none; border-radius:14px; padding:5px 12px 5px 8px; font-size:13px; color:#1a1a1a; cursor:pointer; transition:background .12s; }
  .history-filter-btn:hover { background:#eaeaea; }
  .history-filter-btn svg { width:14px; height:14px; }
  .history-close { background:transparent; border:none; cursor:pointer; color:var(--muted); padding:4px; border-radius:4px; display:flex; }
  .history-close:hover { background:#f2f2f2; color:#1a1a1a; }
  .history-close svg { width:18px; height:18px; }

  .filter-menu { position:absolute; top:48px; right:56px; min-width:220px; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:70; padding:6px 0; animation:panelIn .15s ease-out; transform-origin:top right; }
  .filter-menu-title { padding:8px 14px 4px; font-size:11px; color:var(--muted); font-weight:500; text-transform:none; }
  .filter-option { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; font-size:13px; color:#1a1a1a; }
  .filter-option:hover { background:#f5f5f5; }
  .filter-option .opt-icon { width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:#1a1a1a; }
  .filter-option .opt-icon svg { width:16px; height:16px; }
  .filter-option .opt-icon .avatar { width:18px; height:18px; border:none; margin:0; }
  .filter-option .opt-label { flex:1; }
  .filter-option .opt-check { color:#1a1a1a; opacity:0; }
  .filter-option.selected .opt-check { opacity:1; }
  .filter-option .opt-check svg { width:14px; height:14px; }
  .filter-menu-divider { height:1px; background:var(--border); margin:6px 0; }
  .history-body { flex:1; overflow-y:auto; padding-bottom:8px; }
  .history-groups {
    /* Vertical timeline line through chevron + avatar column (center at 36px from left) */
    background-image: linear-gradient(#e3e3e3, #e3e3e3);
    background-repeat: no-repeat;
    background-position: 35px 24px;
    background-size: 1.5px calc(100% - 40px);
  }
  .history-group { padding:4px 0; position:relative; }
  .history-group-header {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px 10px 22px; cursor:pointer; user-select:none;
    position:relative;
  }
  .history-group-header:hover .group-chevron { background:#eee; }
  .group-chevron {
    width:28px; height:28px; border-radius:50%;
    background:#f2f2f2; display:flex; align-items:center; justify-content:center;
    color:#555; transition:transform .2s, background .12s;
  }
  .group-chevron svg { width:14px; height:14px; }
  .history-group.collapsed .group-chevron svg { transform:rotate(-90deg); transition:transform .2s; }
  .history-group:not(.collapsed) .group-chevron svg { transform:rotate(0); transition:transform .2s; }
  .group-title { flex:1; font-size:15px; font-weight:600; color:#1a1a1a; }
  .group-meta { font-size:13px; color:var(--muted); }
  .group-current-badge { font-size:12px; background:#f2f2f2; color:#5a5a5a; padding:4px 10px; border-radius:14px; font-weight:500; cursor:pointer; transition:background .12s, color .12s; }
  .group-current-badge:hover { background:#1a1a1a; color:#fff; }
  .history-item.flash-current { animation:flashCurrent 1.2s ease-out; }
  @keyframes flashCurrent { 0% { background:#fff3e6; } 100% { background:transparent; } }
  .history-items { padding:0 0 8px; }
  .history-group.collapsed .history-items { display:none; }

  .history-item {
    position:relative;
    display:flex; gap:12px; align-items:flex-start;
    padding:8px 16px 8px 18px;
    cursor:pointer;
    transition:background .12s;
  }
  .history-item:hover { background:#f7f7f7; }
  .history-item.viewing { background:#eef3ff; }
  .history-item.viewing::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#3b82f6;
  }

  /* Read-only chips in the subbar */
  .readonly-pill {
    display:none; align-items:center; gap:6px;
    background:#dbe5ff; color:#2a4bd6;
    padding:4px 10px; border-radius:14px;
    font-size:12px; font-weight:600;
    cursor:default; position:relative;
  }
  .asof-chip {
    display:none; align-items:center; gap:6px;
    background:#f4f4f4; color:#3a3a3a;
    padding:4px 10px 4px 8px; border-radius:14px;
    font-size:12px; font-weight:500;
    cursor:default; position:relative;
  }
  .asof-chip svg { width:13px; height:13px; opacity:.7; }
  body.readonly-mode .readonly-pill,
  body.readonly-mode .asof-chip { display:inline-flex; }
  body.readonly-mode .saved { display:none; }

  /* Read-only info banner (below the subbar) */
  .readonly-banner {
    position:absolute; top:12px; left:50%; z-index:90;
    background:#f4f4f4; color:#1a1a1a;
    display:inline-flex; align-items:center; gap:12px;
    padding:8px 14px; font-size:13px;
    border-radius:10px;
    border:1px solid #e4e4e4;
    box-shadow:0 4px 16px rgba(0,0,0,.10);
    opacity:0; transform:translate(-50%, -12px);
    transition:opacity .25s ease, transform .25s ease;
    white-space:nowrap;
  }
  .readonly-banner.show { opacity:1; transform:translate(-50%, 0); }

  /* Group header: bigger circular chevron, lighter title */
  .group-chevron {
    width:32px; height:32px;
    background:#fff; border:1px solid #e4e4e4;

  .history-group-header:hover .group-chevron { background:#f7f7f7; }
  .group-title { font-weight:500; color:#1a1a1a; }
  .group-meta { color:#9a9a9a; }
  /* Promote the current-version row to a hero card */
  .group-current-badge {
    background:#eef3ff; color:#2563eb; border-radius:10px; padding:10px 14px;
    font-weight:600; font-size:13px;
  }
  .group-current-badge:hover { background:#dfe9ff; color:#1d4fd1; }
  /* Pull the timeline line behind the cards, centered through chevrons */
  .history-groups { background-position:37px 24px; }

  /* ===== Time-travel hidden state (nodes/edges that don't exist yet) ===== */
  .node { transition:opacity .35s ease, transform .35s ease, box-shadow .25s ease; }
  #edges line { transition:opacity .35s ease, stroke .25s ease; }
  .edge-label { transition:opacity .35s ease; }
  .node.tt-hidden { opacity:0; transform:scale(0.4); pointer-events:none; }
  #edges line.tt-hidden { opacity:0; }
  .edge-label.tt-hidden { opacity:0; }

  /* ===== Diff coloring (read-only mode) ===== */
  .node.diff-added { box-shadow:0 0 0 3px #22c55e, 0 0 16px rgba(34,197,94,.45); animation:diffPulse 1.2s ease-out; }
  @keyframes diffPulse { 0% { transform:scale(0.6); } 60% { transform:scale(1.08); } 100% { transform:scale(1); } }
  .node.diff-removed { opacity:.45; box-shadow:0 0 0 2px #ef4444; border:1.5px dashed #ef4444 !important; }
  .node.diff-modified { box-shadow:0 0 0 3px #f59e0b, 0 0 14px rgba(245,158,11,.4); }
  .node.diff-added::after,
  .node.diff-modified::after,
  .node.diff-removed::after {
    content:''; position:absolute; top:-4px; right:-4px;
    width:14px; height:14px; border-radius:50%; border:2px solid #fff;

  }
  .node.diff-modified::after { background:#f59e0b; }
  .node.diff-removed::after { background:#ef4444; }
  #edges line.diff-added { stroke:#22c55e !important; stroke-width:2.2 !important; }
  #edges line.diff-modified { stroke:#f59e0b !important; stroke-width:2.2 !important; }
  #edges line.diff-removed { stroke:#ef4444 !important; stroke-dasharray:6 4; opacity:.7; }
  .edge-label.diff-removed { opacity:.5; text-decoration:line-through; }
  /* Ghost node — shown only while viewing a version where it was removed */
  .node.ghost-node {
    background:transparent !important;

    border:1.5px dashed #ef4444;

  .node.ghost-node .node-icon { opacity:.5; }

  /* Diff legend (inline inside the scrubber) */

  .diff-legend .dl-modified { background:#f59e0b; }

  /* ===== Time-scrubber ===== */
  .time-scrubber {

  .ts-track-wrap { position:relative; height:32px; }

  .ts-thumb:hover, .ts-thumb.dragging { box-shadow:0 0 0 6px rgba(59,130,246,.15); }

  .ts-tooltip {

</style>

<script>
const users = [
  { id:'tom',  name:'Tom Martin', color:'#ef4444', initials:'TM', avatar:'https://i.pravatar.cc/96?img=33' },
  { id:'adam', name:'Adam H',     color:'#3b82f6', initials:'AH', avatar:'https://i.pravatar.cc/96?img=8'  },
  { id:'sara', name:'Sara Chen',  color:'#10b981', initials:'SC', avatar:'https://i.pravatar.cc/96?img=47' },
  { id:'mike', name:'Mike Lopez', color:'#8b5cf6', initials:'ML', avatar:'https://i.pravatar.cc/96?img=60' },
  { id:'kira', name:'Kira Patel', color:'#f59e0b', initials:'KP', avatar:'https://i.pravatar.cc/96?img=5'  },
];
const currentUser = { id:'you', name:'Sara', color:'#ff5b2e', initials:'S', avatar:'https://i.pravatar.cc/96?img=44' };

const nodes = [
  { id:'n0', x:600,  y:950,  label:'Coinbase.com' },
  { id:'n1', x:1000, y:780,  label:'0xCd5f8...e5FC4' },
  { id:'n2', x:1000, y:950,  label:'0xN283j...k39du' },
  { id:'n3', x:1000, y:1120, label:'0x4ll39...993j3', addedByAi:true },
  { id:'n4', x:1400, y:780,  label:'0x00s34...22kj3' },
  { id:'n5', x:1400, y:950,  label:'0xDm032...kkdID' },
  { id:'n6', x:1400, y:1120, label:'0x33Kls...09dk3', addedByAi:true },
  { id:'n7', x:1800, y:950,  label:'Helix Mixer', sublabel:'Mixing', mixer:true },
];
const edges = [
  { from:'n0', to:'n1', label:'$17k (3)' },
  { from:'n0', to:'n2', label:'$17k (3)' },
  { from:'n0', to:'n3', label:'$17k (3)' },
  { from:'n1', to:'n4', label:'$17k (3)' },
  { from:'n2', to:'n5', label:'$17k (3)' },
  { from:'n3', to:'n6', label:'$17k (3)' },
  { from:'n4', to:'n7', label:'$17k (3)' },
  { from:'n5', to:'n7', label:'$17k (3)' },
  { from:'n6', to:'n7', label:'$17k (3)' },
];

const canvas = document.getElementById('canvas');
const edgesSvg = document.getElementById('edges');
const main = document.getElementById('main');
function getNode(id) { return nodes.find(n => n.id === id); }

(function renderGraph() {
  edgesSvg.setAttribute('viewBox', '0 0 3000 2000');
  // arrowhead defs + lines
  const r = 32; // node radius for trimming arrow endpoints
  let svgInner = `
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#a8a8a8"/>
      </marker>
    </defs>
  `;
  edges.forEach((e, i) => {
    const a = getNode(e.from), b = getNode(e.to);
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const ux = dx/len, uy = dy/len;
    const x1 = a.x + ux * (r + 2);
    const y1 = a.y + uy * (r + 2);
    const x2 = b.x - ux * (r + 8);
    const y2 = b.y - uy * (r + 8);
    svgInner += `<line data-id="e${i}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#a8a8a8" stroke-width="1.2" marker-end="url(#arrow)"/>`;
  });
  edgesSvg.innerHTML = svgInner;

  edges.forEach((e, i) => {
    const a = getNode(e.from), b = getNode(e.to);
    const lbl = document.createElement('div');
    lbl.className = 'edge-label';
    lbl.dataset.id = `e${i}`;
    lbl.style.left = ((a.x + b.x)/2) + 'px';
    lbl.style.top = ((a.y + b.y)/2 - 12) + 'px';
    lbl.textContent = e.label;
    canvas.appendChild(lbl);
  });

  const walletIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1.2" fill="currentColor" stroke="none"/></svg>`;
  const mixerIcon = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10v2l-3 4v4l4 8H6l4-8V8L7 4V2zm2.5 2l2 2.5v4.5l-3 6h7l-3-6V6.5L14.5 4h-5z"/></svg>`;
  const badgeWallet = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2zm-2 8h-2v-2h2v2z"/></svg>`;

  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.mixer ? ' mixer-node' : '');
    el.style.left = (n.x - 28) + 'px';
    el.style.top = (n.y - 28) + 'px';
    el.dataset.id = n.id;

    const icon = document.createElement('div');
    icon.className = 'node-icon';
    icon.innerHTML = n.mixer ? mixerIcon : walletIcon;
    el.appendChild(icon);

// ============== AI-ADDED NODE REGIONS (visual only) ==============
(function renderAiRegions() {
  const aiSet = new Set(nodes.filter(n => n.addedByAi).map(n => n.id));
  if (!aiSet.size) return;
  // adjacency limited to edges between AI-added nodes
  const adj = {};
  edges.forEach(e => {
    if (aiSet.has(e.from) && aiSet.has(e.to)) {
      (adj[e.from] = adj[e.from] || []).push(e.to);
      (adj[e.to] = adj[e.to] || []).push(e.from);
    }
  });
  // connected components = clusters
  const seen = new Set();
  const clusters = [];
  aiSet.forEach(start => {
    if (seen.has(start)) return;
    const stack = [start], comp = [];
    while (stack.length) {
      const id = stack.pop();
      if (seen.has(id)) continue;
      seen.add(id); comp.push(id);
      (adj[id] || []).forEach(nb => { if (!seen.has(nb)) stack.push(nb); });
    }
    clusters.push(comp);
  });
  const nodeR = 28, padX = 40, padTop = 48, padBottom = 52;
  clusters.forEach(ids => {
    const ns = ids.map(getNode);
    const minX = Math.min(...ns.map(n => n.x)) - nodeR - padX;
    const maxX = Math.max(...ns.map(n => n.x)) + nodeR + padX;
    const minY = Math.min(...ns.map(n => n.y)) - nodeR - padTop;
    const maxY = Math.max(...ns.map(n => n.y)) + nodeR + padBottom;
    const region = document.createElement('div');
    region.className = 'ai-region';
    region.dataset.nodeIds = ids.join(',');
    region.style.left = minX + 'px';
    region.style.top = minY + 'px';
    region.style.width = (maxX - minX) + 'px';
    region.style.height = (maxY - minY) + 'px';
    const aiSparkle = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 7 L11.6 10.4 L15 12 L11.6 13.6 L10 17 L8.4 13.6 L5 12 L8.4 10.4 Z"/><path d="M16 6 L16.8 7.7 L18.5 8.5 L16.8 9.3 L16 11 L15.2 9.3 L13.5 8.5 L15.2 7.7 Z"/><path d="M15.5 13.5 L16.1 14.5 L17 15 L16.1 15.5 L15.5 16.5 L14.9 15.5 L14 15 L14.9 14.5 Z"/></svg>`;
    region.innerHTML = `<div class="ai-region-chip"><div class="ai-avatar-wrap"><div class="ai-avatar">${aiSparkle}</div><div class="ai-attrib" style="background-image:url('${currentUser.avatar}')"></div></div>Added by AI Agent</div>`;
    canvas.insertBefore(region, edgesSvg);
  });
})();

}
function centerOnCanvasPoint(cx, cy) { camera.x = 1500 - cx; camera.y = 1000 - cy; applyCamera(); }

function updateCursorScreen(uid) {
  const el = cursorEls[uid];
  const p = cursorState[uid];
  const cRect = canvas.getBoundingClientRect();

  const sx = cRect.width / 3000, sy = cRect.height / 2000;

  const fy = cRect.top + p.y * sy - mainRect.top;
  el.style.transform = `translate(${fx}px, ${fy}px)`;
}

function renderPanelLists() {
  if (!panel) return;
  const cur = document.getElementById('currentlyViewing');
  const prev = document.getElementById('previouslyViewing');
  const currently = users.filter(u => visibleUserIds.has(u.id));
  const previously = users.filter(u => !visibleUserIds.has(u.id));

  cur.innerHTML = '';
  currently.forEach(u => {
    const isFollowing = spotlightTarget && spotlightTarget.id === u.id;
    const row = document.createElement('div');
    row.className = 'user-row' + (isFollowing ? ' active' : '') + (highlightUserId === u.id ? ' highlight' : '');
    row.innerHTML = `

      if (isFollowing) stopSpotlight();

  prev.innerHTML = '';
  if (previously.length === 0) {
    prev.innerHTML = '<div class="user-row dim"><div class="user-info"><div class="user-meta">No previous viewers</div></div></div>';

}

let openPopover = null;
function closeItemPopover() {

function openItemPopover(anchor, item) {

      Copy link
    </div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Duplicate
    </div>
    <div class="popover-action" data-act="restore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      Restore this version
    </div>
  `;
  historyDrawer.appendChild(pop);
  // position near anchor
  const aRect = anchor.getBoundingClientRect();
  const dRect = historyDrawer.getBoundingClientRect();
  pop.style.left = (aRect.left - dRect.left - 170) + 'px';
  pop.style.top = (aRect.bottom - dRect.top + 4) + 'px';
  openPopover = pop;
  pop.querySelectorAll('.popover-action').forEach(a => a.addEventListener('click', (e) => {
    e.stopPropagation();
    const act = a.dataset.act;
    closeItemPopover();
    if (act === 'restore') {
      restoreVersion(item);
    } else if (act === 'name') {
      const cur = item.named || '';
      const name = window.prompt('Name this version', cur || 'Untitled version');
      if (name && name.trim()) {
        item.named = name.trim();
        if (!item.version) {
          const used = versionHistory.flatMap(g => g.items).filter(i => i.version).map(i => parseInt(i.version.replace('v',''),10));
          const next = (used.length ? Math.max(...used) : 0) + 1;
          item.version = 'v' + next;
        }
        renderHistoryBody();
        showRestoreToast(`Saved as "${item.named}"`);
      }
    } else if (act === 'copy') {
      const url = `${location.origin}${location.pathname}#version=${encodeURIComponent((item.time || '') + '-' + (item.desc || '').slice(0,30))}`;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => showRestoreToast('Link copied to clipboard'));
      } else {
        showRestoreToast('Link copied to clipboard');
      }
    }
  }));
}

  viewingVersion = item;

function formatAsOf(groupLabel, time) {
  // groupLabel examples: 'Today', 'Yesterday', 'May 17th, 7:50 AM'
  const today = new Date(2026, 4, 20); // May 20, 2026 (mock current date)
  if (groupLabel === 'Today') return `May 20, 2026 ${time} UTC`;
  if (groupLabel === 'Yesterday') return `May 19, 2026 ${time} UTC`;
  // Extract month + day from group label like 'May 17th, 7:50 AM'
  const m = groupLabel.match(/^([A-Za-z]+)\s+(\d+)/);
  if (m) return `${m[1]} ${m[2]}, 2026 ${time} UTC`;
  return `${groupLabel} ${time} UTC`;
}

// Tooltip helpers
let activeRoTooltip = null;
function attachRoTooltip(el, text) {
  if (!el || el.__roTipBound) return;
  el.__roTipBound = true;
  el.__roTipText = text;
  const show = () => {
    if (!document.body.classList.contains('readonly-mode')) return;
    hideRoTooltip();
    const tip = document.createElement('div');
    tip.className = 'ro-tooltip';
    tip.textContent = el.__roTipText;
    document.body.appendChild(tip);
    const r = el.getBoundingClientRect();
    const tr = tip.getBoundingClientRect();
    tip.style.top = (r.bottom + 8) + 'px';
    tip.style.left = Math.max(8, Math.min(window.innerWidth - tr.width - 8, r.left + r.width/2 - tr.width/2)) + 'px';
    activeRoTooltip = tip;
  };
  el.addEventListener('mouseenter', show);
  el.addEventListener('mouseleave', hideRoTooltip);
}
function hideRoTooltip() {
  if (activeRoTooltip) { activeRoTooltip.remove(); activeRoTooltip = null; }
}

function exitReadOnlyMode() {
  viewingVersion = null;
  document.body.classList.remove('readonly-mode');
  hideRoTooltip();
  if (readonlyBanner) {
    readonlyBanner.classList.remove('show');
    const b = readonlyBanner; readonlyBanner = null;
    setTimeout(() => b.remove(), 250);
  }
  if (canvasLockOverlay) { canvasLockOverlay.remove(); canvasLockOverlay = null; }
  if (historyDrawer) renderHistoryBody();
  updateGraphNameLabel();
  clearDiff();
  // Scrubber stays open until the user closes the activity log

  // Highlight the current version in the activity log
  if (allVersions.length === 0) buildAllVersions();
  const cur = allVersions[allVersions.length - 1];
  if (cur) highlightHistoryItemFor(cur);
}

function clearDiff() {
  document.querySelectorAll('.node.diff-added, .node.diff-removed, .node.diff-modified')
    .forEach(n => n.classList.remove('diff-added','diff-removed','diff-modified'));
  document.querySelectorAll('#edges line.diff-added, #edges line.diff-removed, #edges line.diff-modified')
    .forEach(l => l.classList.remove('diff-added','diff-removed','diff-modified'));
  document.querySelectorAll('.edge-label.diff-removed')
    .forEach(l => l.classList.remove('diff-removed'));
  // Restore visibility of anything hidden by time travel
  document.querySelectorAll('.node.tt-hidden').forEach(n => n.classList.remove('tt-hidden'));
  document.querySelectorAll('#edges line.tt-hidden').forEach(l => l.classList.remove('tt-hidden'));
  document.querySelectorAll('.edge-label.tt-hidden').forEach(l => l.classList.remove('tt-hidden'));
  // Remove ghost-node DOM elements
  document.querySelectorAll('.ghost-node, .ghost-label').forEach(el => el.remove());
  updateAiRegionsVisibility();
}
function hiddenAtItem(item) {
  if (allVersions.length === 0) buildAllVersions();
  const idx = allVersions.findIndex(v => v.time === item.time && v.desc === item.desc);
  const hiddenNodes = new Set();
  const hiddenEdges = new Set();
  if (idx === -1) return { nodes:hiddenNodes, edges:hiddenEdges };
  for (let i = idx + 1; i < allVersions.length; i++) {
    const d = versionDeltas[allVersions[i].desc];
    if (!d) continue;
    (d.addedNodes || []).forEach(id => hiddenNodes.add(id));
    (d.addedEdges || []).forEach(id => hiddenEdges.add(id));
  }
  return { nodes:hiddenNodes, edges:hiddenEdges };
}
function applyDiffForItem(item) {
  clearDiff();
  if (!item || item.current) return;
  // Hide things that don't exist yet at this version
  const hidden = hiddenAtItem(item);
  hidden.nodes.forEach(id => {
    const el = document.querySelector(`.node[data-id="${id}"]`);
    if (el) el.classList.add('tt-hidden');
  });
  hidden.edges.forEach(id => {
    const el = document.querySelector(`#edges line[data-id="${id}"]`);
    if (el) el.classList.add('tt-hidden');
    const lbl = document.querySelector(`.edge-label[data-id="${id}"]`);
    if (lbl) lbl.classList.add('tt-hidden');
  });
  updateAiRegionsVisibility();
  const delta = versionDeltas[item.desc];
  if (!delta) return;
  const tag = (sel, cls, ids) => (ids||[]).forEach(id => {
    const el = document.querySelector(`${sel}[data-id="${id}"]`);
    if (el) el.classList.add(cls);
  });
  tag('.node', 'diff-added',    delta.addedNodes);
  tag('.node', 'diff-removed',  delta.removedNodes);
  tag('.node', 'diff-modified', delta.modifiedNodes);
  tag('#edges line', 'diff-added',    delta.addedEdges);
  tag('#edges line', 'diff-removed',  delta.removedEdges);
  tag('#edges line', 'diff-modified', delta.modifiedEdges);
  (delta.removedEdges||[]).forEach(id => {
    const lbl = document.querySelector(`.edge-label[data-id="${id}"]`);
    if (lbl) lbl.classList.add('diff-removed');
  });
  // Render ghost nodes (representations of deleted items at this version)
  (delta.removedGhosts || []).forEach(g => {
    const el = document.createElement('div');
    el.className = 'node ghost-node';
    el.style.left = (g.x - 28) + 'px';
    el.style.top  = (g.y - 28) + 'px';
    const icon = document.createElement('div');
    icon.className = 'node-icon';

// ===== Time-scrubber (light) =====
let scrubberEl = null;
let allVersions = []; // chronological: oldest -> newest

function highlightHistoryItemFor(v) {
  if (!historyDrawer) return;
  // Auto-expand the group containing this version if it's collapsed
  if (v.group && collapsedGroups.has(v.group)) {
    collapsedGroups.delete(v.group);
    renderHistoryBody();
  }
  const body = historyDrawer.querySelector('#historyBody');
  if (!body) return;
  // Clear previous highlight
  body.querySelectorAll('.history-item.ts-active').forEach(el => el.classList.remove('ts-active'));
  const key = `${v.time}||${v.desc}`;
  const el = body.querySelector(`.history-item[data-vkey="${CSS.escape(key)}"]`);
  if (!el) return;
  el.classList.add('ts-active');
  // Wait one frame so layout (after any re-render from enterReadOnlyMode) is settled
  requestAnimationFrame(() => {
    try { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (e) {}
  });
}

function buildAllVersions() {
  allVersions = [];
  // versionHistory is newest-first per group; flatten then reverse for chronological
  versionHistory.forEach(grp => {
    grp.items.forEach(it => allVersions.push({ ...it, group: grp.group }));
  });
  allVersions.reverse(); // now oldest first; current item is the last entry
}

function openScrubber() {
  if (scrubberEl) { closeScrubber(); return; }
  if (allVersions.length === 0) buildAllVersions();
  scrubberEl = document.createElement('div');
  scrubberEl.className = 'time-scrubber open';
  scrubberEl.innerHTML = `
    <div class="ts-header">
      <div class="ts-header-left">
        <button class="ts-play-btn" id="tsPlayBtn" title="Play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <span class="ts-title">Activity timeline</span>
      </div>
      <div class="ts-header-right">
        <div class="diff-legend">
          <span><span class="dl-swatch dl-added"></span>Just added</span>
          <span><span class="dl-swatch dl-modified"></span>Modified</span>
          <span><span class="dl-swatch dl-removed"></span>Removed</span>
        </div>
        <button class="ts-now-btn" id="tsNowBtn">Jump to current</button>
      </div>
    </div>
    <div class="ts-track-wrap" id="tsTrackWrap">
      <div class="ts-track"></div>
      <div class="ts-track-fill" id="tsTrackFill"></div>
      <div class="ts-thumb" id="tsThumb" tabindex="0">
        <div class="ts-tooltip" id="tsTooltip"></div>
      </div>
    </div>
    <div class="ts-ends">
      <span>Oldest</span>
      <span>Current</span>
    </div>
  `;
  main.appendChild(scrubberEl);

  // Place tick marks
  const wrap = scrubberEl.querySelector('#tsTrackWrap');
  const n = allVersions.length;
  allVersions.forEach((v, i) => {
    const tick = document.createElement('div');
    tick.className = 'ts-tick' + (v.named ? ' named' : '');
    tick.style.left = `${(i / (n - 1)) * 100}%`;
    if (v.named) tick.title = `${v.version || ''} ${v.named}`;
    wrap.appendChild(tick);
  });

  // Drag handling
  const thumb = scrubberEl.querySelector('#tsThumb');
  const fill = scrubberEl.querySelector('#tsTrackFill');
  const tooltip = scrubberEl.querySelector('#tsTooltip');
  let dragging = false;

  function indexFromClientX(clientX) {
    const rect = wrap.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(ratio * (n - 1));
  }
  function setIndex(i) {
    const v = allVersions[i];
    const pct = (i / (n - 1)) * 100;
    thumb.style.left = `${pct}%`;
    fill.style.width = `${pct}%`;
    let actor = '';
    if (v.actor === 'user') {
      const u = v.actorId === 'you' ? currentUser : users.find(x => x.id === v.actorId);
      actor = u ? u.name : '';
    } else if (v.actor === 'automation') actor = 'Workflow';
    else if (v.actor === 'llm') actor = 'AI agent';
    else if (v.actor === 'data') actor = 'Data sync';
    tooltip.innerHTML = `<span class="tt-time">${v.time}</span><span class="tt-actor">· ${actor}</span><span class="tt-desc">${v.desc.length > 50 ? v.desc.slice(0,50)+'…' : v.desc}</span>`;
    // Trigger read-only mode (or exit if current)
    if (v.current) {
      if (document.body.classList.contains('readonly-mode')) exitReadOnlyMode();
    } else {
      enterReadOnlyMode(v);
    }
    highlightHistoryItemFor(v);
  }
  thumb.addEventListener('mousedown', (e) => { dragging = true; thumb.classList.add('dragging'); e.preventDefault(); });
  wrap.addEventListener('mousedown', (e) => {
    if (e.target === thumb || thumb.contains(e.target)) return;
    setIndex(indexFromClientX(e.clientX));
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    setIndex(indexFromClientX(e.clientX));
  });
  document.addEventListener('mouseup', () => { if (dragging) { dragging = false; thumb.classList.remove('dragging'); } });

  scrubberEl.querySelector('#tsNowBtn').addEventListener('click', () => { stopPlay(); setIndex(n - 1); });

  // Play / pause auto-advance
  const playBtn = scrubberEl.querySelector('#tsPlayBtn');
  const playIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const pauseIcon = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>';
  let playTimer = null;
  function stopPlay() {
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
    playBtn.innerHTML = playIcon;
    playBtn.title = 'Play';
    playBtn.classList.remove('playing');
  }
  function startPlay() {
    // If at the end, restart from oldest
    let curPct = parseFloat(thumb.style.left) || 0;
    let curIdx = Math.round((curPct / 100) * (n - 1));
    if (curIdx >= n - 1) curIdx = 0;
    setIndex(curIdx);
    playBtn.innerHTML = pauseIcon;
    playBtn.title = 'Pause';
    playBtn.classList.add('playing');
    function step() {
      const pct = parseFloat(thumb.style.left) || 0;
      const idx = Math.round((pct / 100) * (n - 1));
      if (idx >= n - 1) { stopPlay(); return; }
      setIndex(idx + 1);
      playTimer = setTimeout(step, 1100);
    }
    playTimer = setTimeout(step, 900);
  }
  playBtn.addEventListener('click', () => {
    if (playTimer) stopPlay(); else startPlay();
  });
  // Pause when the user starts dragging or scrubbing
  thumb.addEventListener('mousedown', stopPlay);
  wrap.addEventListener('mousedown', (e) => {
    if (e.target === thumb || thumb.contains(e.target)) return;
    stopPlay();
  });
  scrubberEl._stopPlay = stopPlay;

  syncScrubberThumb();
}
function closeScrubber() {
  if (!scrubberEl) return;
  if (scrubberEl._stopPlay) scrubberEl._stopPlay();
  scrubberEl.remove();
  scrubberEl = null;
}
function syncScrubberThumb() {
  if (!scrubberEl) return;
  if (allVersions.length === 0) buildAllVersions();
  const thumb = scrubberEl.querySelector('#tsThumb');
  const fill = scrubberEl.querySelector('#tsTrackFill');
  const tooltip = scrubberEl.querySelector('#tsTooltip');
  let i = allVersions.length - 1;
  if (viewingVersion) {
    const found = allVersions.findIndex(v => v.time === viewingVersion.time && v.desc === viewingVersion.desc);
    if (found !== -1) i = found;
  }
  const n = allVersions.length;
  const pct = (i / (n - 1)) * 100;
  thumb.style.left = `${pct}%`;
  fill.style.width = `${pct}%`;
  const v = allVersions[i];
  let actor = '';
  if (v.actor === 'user') {
    const u = v.actorId === 'you' ? currentUser : users.find(x => x.id === v.actorId);
    actor = u ? u.name : '';
  } else if (v.actor === 'automation') actor = 'Workflow';
  else if (v.actor === 'llm') actor = 'AI agent';
  else if (v.actor === 'data') actor = 'Data sync';
  tooltip.innerHTML = `<span class="tt-time">${v.time}</span><span class="tt-actor">· ${actor}</span><span class="tt-desc">${v.desc.length > 50 ? v.desc.slice(0,50)+'…' : v.desc}</span>`;
}

function currentGroupLabelFor(item) {

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showRestoreToast(msg) {

    ${escapeHtml(msg)}
  `;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 2400);
  setTimeout(() => t.remove(), 2800);
}

// Submenu state (delayed open/close like native menus)
let vpSubmenuOpenTimer = null;
let vpSubmenuCloseTimer = null;
let vpActiveSubmenus = []; // stack: [{row, sub}]

function vpCancelTimers() {
  if (vpSubmenuOpenTimer) { clearTimeout(vpSubmenuOpenTimer); vpSubmenuOpenTimer = null; }
  if (vpSubmenuCloseTimer) { clearTimeout(vpSubmenuCloseTimer); vpSubmenuCloseTimer = null; }
}

function vpCloseSubmenusFrom(level) {
  // close every submenu at or deeper than `level`
  while (vpActiveSubmenus.length > level) {
    const top = vpActiveSubmenus.pop();
    top.row.classList.remove('submenu-open');
    top.sub.remove();
  }
}

function vpScheduleClose(level) {
  if (vpSubmenuCloseTimer) clearTimeout(vpSubmenuCloseTimer);
  vpSubmenuCloseTimer = setTimeout(() => vpCloseSubmenusFrom(level), 220);
}

function vpBuildSubmenu(items) {
  const sub = document.createElement('div');
  sub.className = 'vp-submenu';
  items.forEach(it => {
    const el = document.createElement('div');
    el.className = 'vp-sub-item';
    el.dataset.act = it.act || '';
    el.innerHTML = `
      <div class="vp-sub-icon">${it.icon || ''}</div>
      <div class="vp-sub-label">${escapeHtml(it.label)}</div>
      ${it.children ? `<div class="vp-sub-arrow">${VP_ICONS.chevronRight}</div>` : ''}
    `;
    el.__children = it.children || null;
    el.__act = it.act;
    sub.appendChild(el);
  });
  return sub;
}

function vpPositionSubmenu(sub, anchorRect) {
  document.body.appendChild(sub);
  const sr = sub.getBoundingClientRect();
  let left = anchorRect.right + 6;
  let top = anchorRect.top - 6;
  if (left + sr.width > window.innerWidth - 8) left = Math.max(8, anchorRect.left - sr.width - 6);
  if (top + sr.height > window.innerHeight - 8) top = Math.max(8, window.innerHeight - sr.height - 8);
  sub.style.left = left + 'px';
  sub.style.top = top + 'px';
}

function vpOpenSubmenu(row, level, contextItem) {
  vpCancelTimers();
  vpCloseSubmenusFrom(level); // close any peers/deeper
  const items = [
    { act:'rename',    label:'Rename',    icon:VP_ICONS.pencil },
    { act:'duplicate', label:'Duplicate', icon:VP_ICONS.duplicate },
    { act:'share',     label:'Share',     icon:VP_ICONS.share },
    { act:'export',    label:'Export',    icon:VP_ICONS.export,
      children:[
        { act:'export-pdf',  label:'PDF',  icon:VP_ICONS.export },
        { act:'export-png',  label:'PNG',  icon:VP_ICONS.export },
        { act:'export-json', label:'JSON', icon:VP_ICONS.export },
      ]
    },
  ];
  const sub = vpBuildSubmenu(items);
  vpPositionSubmenu(sub, row.getBoundingClientRect());
  row.classList.add('submenu-open');
  vpActiveSubmenus.push({ row, sub, level });

  sub.addEventListener('mouseenter', vpCancelTimers);
  sub.addEventListener('mouseleave', () => vpScheduleClose(level));

  sub.querySelectorAll('.vp-sub-item').forEach(item => {
    item.addEventListener('mouseenter', () => {
      vpCancelTimers();
      // close any deeper submenus when moving between peer items
      vpCloseSubmenusFrom(level + 1);
      if (item.__children) {
        vpSubmenuOpenTimer = setTimeout(() => {
          const child = vpBuildSubmenu(item.__children);
          vpPositionSubmenu(child, item.getBoundingClientRect());
          item.classList.add('submenu-open');
          vpActiveSubmenus.push({ row: item, sub: child, level: level + 1 });
          child.addEventListener('mouseenter', vpCancelTimers);
          child.addEventListener('mouseleave', () => vpScheduleClose(level + 1));
          child.querySelectorAll('.vp-sub-item').forEach(ci => {
            ci.addEventListener('click', () => vpHandleAction(ci.__act || ci.dataset.act, contextItem));
          });
        }, 160);
      }
    });
    item.addEventListener('click', (e) => {
      if (item.__children) { e.stopPropagation(); return; }
      vpHandleAction(item.__act || item.dataset.act, contextItem);
    });
  });
}

function vpHandleAction(act, contextItem) {
  vpCloseSubmenusFrom(0);
  closeVersionPicker();
  const name = contextItem === 'current' ? 'Current' : (contextItem.named || 'version');
  const pretty = ({
    'rename':'Rename', 'duplicate':'Duplicate', 'share':'Share',
    'export-pdf':'Export as PDF', 'export-png':'Export as PNG', 'export-json':'Export as JSON',
  })[act] || act;
  showRestoreToast(`${pretty} — "${name}"`);
}

function vpAttachRowHover(row, contextItem) {
  row.addEventListener('mouseenter', () => {
    vpCancelTimers();
    // close peer submenus (anything beyond level 0)
    vpCloseSubmenusFrom(0);
    vpSubmenuOpenTimer = setTimeout(() => vpOpenSubmenu(row, 0, contextItem), 200);
  });
  row.addEventListener('mouseleave', () => {
    if (vpSubmenuOpenTimer) { clearTimeout(vpSubmenuOpenTimer); vpSubmenuOpenTimer = null; }
    vpScheduleClose(0);
  });
}

function openVersionPicker() {
  closeVersionPicker();

  vpAttachRowHover(currentRow, 'current');

  versionPicker.addEventListener('mouseenter', vpCancelTimers);

  document.body.appendChild(versionPicker);

  versionPicker.style.top = (r.bottom + 6) + 'px';
  versionPicker.style.left = r.left + 'px';

function closeVersionPicker() {

    enter() {
      if (chatDrawer) closeChatDrawer();
      if (historyDrawer) closeHistory();
      closePanel();
      stopSpotlight();
      if (meSpotlighting) toggleMeSpotlight();
      document.getElementById('savedLabel').classList.add('pulse');
    },
    exit() { document.getElementById('savedLabel').classList.remove('pulse'); }
  },
  {
    text: "The Activity log shows every edit, automation, and AI action — grouped by day, with a timeline of who did what. ★ V1/V2/V3 mark named versions saved by people.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (!historyDrawer) openHistory();
    }
  },
  {
    text: "The Activity timeline at the bottom is the visual companion to the log. Drag the thumb — or hit ▶ Play — to watch the graph build itself version by version: 🟢 added, 🟠 modified, 🔴 removed.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (!historyDrawer) openHistory(); // also opens the scrubber
      setTimeout(() => {
        const playBtn = document.getElementById('tsPlayBtn');
        if (playBtn) playBtn.classList.add('pulse');
      }, 300);
    },
    exit() {
      const playBtn = document.getElementById('tsPlayBtn');
      if (playBtn) playBtn.classList.remove('pulse');
    }
  },
  {
    text: "Use the filter pill (top-right of the drawer) to narrow the list — show only your edits, only Automations, only LLM actions, or toggle auto-saved versions on/off.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (!historyDrawer) openHistory();
      closeFilterMenu();
      setTimeout(() => openFilterMenu(), 250);
    },
    exit() { closeFilterMenu(); }
  },
  {
    text: "Click any historical entry to enter read-only mode and view that version. Use 'Restore' to bring it back.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (!historyDrawer) openHistory();
      const item = versionHistory.flatMap(g => g.items).find(i => i.named === 'Before adding cluster A');
      if (item) setTimeout(() => enterReadOnlyMode(item), 200);
    },
    exit() { if (viewingVersion) exitReadOnlyMode(); }
  },
  {
    text: "Click the sparkle icon on a human edit to open 'Summary of changes' — what was changed, why it matters, and suggested next steps. Notice the Deterministic chip.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (viewingVersion) exitReadOnlyMode();
      if (!historyDrawer) openHistory();
      const item = versionHistory.flatMap(g => g.items).find(i => i.actor === 'user' && i.desc.includes('Suspect cluster A'));
      if (item) setTimeout(() => openAiSummaryPanel(item), 200);
    },
    exit() { if (historyDrawer) restoreHistoryHeader(); }
  },
  {
    text: "For AI actions, the same icon opens 'Agent reasoning' instead — a structured Action → Result → Claim → Source chain you can inspect before trusting the output. Notice the AI inference chip.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (viewingVersion) exitReadOnlyMode();
      if (!historyDrawer) openHistory();
      const item = versionHistory.flatMap(g => g.items).find(i => i.actor === 'llm' && i.desc.includes('Helix'));
      if (item) setTimeout(() => openAiSummaryPanel(item), 200);
    },
    exit() { if (historyDrawer) restoreHistoryHeader(); }
  },
  {
    text: "Some AI entries link back to the chat that produced them. Click 'View in chat' on an LLM item to open the agentic conversation on the left — review the original prompt, results, and reply inline.",
    enter() {
      if (viewingVersion) exitReadOnlyMode();
      if (!historyDrawer) openHistory();
      const item = versionHistory.flatMap(g => g.items).find(i => i.actor === 'llm' && i.chat && i.desc.includes('Helix'));
      if (item) setTimeout(() => openChatDrawer(item), 250);
    },
    exit() { if (chatDrawer) closeChatDrawer(); }
  },
  {
    text: "Need to switch versions quickly? Click the graph-name chip in the sub-bar — it's a dropdown of named versions (Current, V3, V2, V1) you can jump between without opening the full log.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (viewingVersion) exitReadOnlyMode();
      if (historyDrawer) closeHistory();
      closeVersionPicker();
      document.getElementById('graphNameBtn').classList.add('pulse');
      setTimeout(() => openVersionPicker(), 400);
    },
    exit() {
      document.getElementById('graphNameBtn').classList.remove('pulse');
      closeVersionPicker();
    }
  },
  {
    text: "Hover any row in the picker to reveal more actions — Rename, Duplicate, Share, Export. Selecting a past version drops you into read-only mode; pick 'Current' to come back.",
    enter() {
      if (chatDrawer) closeChatDrawer();
      if (viewingVersion) exitReadOnlyMode();
      if (historyDrawer) closeHistory();
      if (!versionPicker) openVersionPicker();
      setTimeout(() => {
        const namedRow = versionPicker && versionPicker.querySelectorAll('.vp-option')[1];
        if (namedRow) {
          vpCancelTimers();
          vpOpenSubmenu(namedRow, 0, getNamedVersions()[0]);
        }
      }, 350);
    },
    exit() { closeVersionPicker(); }
  },
];

let sceneIdx = 0;
function goToScene(i) {
  if (i < 0 || i >= scenes.length) return;
  const prev = scenes[sceneIdx];
  if (prev && prev.exit) prev.exit();
  sceneIdx = i;
  const s = scenes[sceneIdx];
  s.enter();
  // From step 10 onward, the focus shifts to version history — hide all teammate
  // presence (cursors + avatar stack) so it doesn't distract from the timeline.
  if (sceneIdx >= 9) {
    visibleUserIds.clear();
    visibleUserIds.add('you');
    users.forEach(u => hideCursor(u.id));
    renderAvatars();
    renderPanelLists();
  }
  sceneText.textContent = s.text;
  sceneCounter.textContent = `${sceneIdx + 1} / ${scenes.length}`;
  prevBtn.style.opacity = sceneIdx === 0 ? '.4' : '1';
  prevBtn.style.pointerEvents = sceneIdx === 0 ? 'none' : 'auto';
  nextBtn.textContent = sceneIdx === scenes.length - 1 ? 'Restart ↻' : 'Next →';
}
nextBtn.addEventListener('click', () => {
  if (sceneIdx === scenes.length - 1) goToScene(0);
  else goToScene(sceneIdx + 1);
});
prevBtn.addEventListener('click', () => goToScene(sceneIdx - 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextBtn.click();
  if (e.key === 'ArrowLeft') prevBtn.click();
});

goToScene(0);
</script>
</body>
</html>
